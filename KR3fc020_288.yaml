body:
  text: 術曰立天元一為小長內減云數餘為小平以小長乘之為小積與小積一算相消得開方式平方翻法開之得小長四步以除直積得一千二十四步為大平羃平方開之得大平三十二步以小長乘之即大長也合問今有大小方田二段共積六千五百二十九步只云小方面乘大方面得三千一百二十步問二方面各幾何答曰大方面六十五步小方面四十八步術曰别得今數為弦羃云數為直積倍之減弦羃餘有二百八十九步平方開之得較一十七步立天元一為大方面以減較步餘為小方面以大方面乘之為直積與只云數相消得開方式平方翻法開之得大方面減較即小方面合問今有大小方田二段只云大方羃內減小方面
