body:
  text: 方面自之就分四之為四段方積寄左又列圓徑自之三因亦為四段圓積加入寄左得再寄列畒通步內子四之與再寄相消得開方式平方翻法開之得圓徑減不及即方面合問今有直田九畒八分只云長取八分之五平取三分之二相併得六十三步問長平各幾何答曰平四十二步長五十六步術曰依母互乘子乃得長十五箇平十六箇分母圖布算相乘得二十四以乘六十三得一千五百一十二即是一十五長一十六平數也立天元一為平以十六乘之減云數餘為一十五長用平乘之為一十五段積寄左列畒通步以一十五乘之與寄左相消得開方式平方開之得平以平除積得長合問
