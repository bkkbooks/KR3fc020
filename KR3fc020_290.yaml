body:
  text: 餘一千二百六十八步又云小方羃內減大方面餘七百四十八步問大小方面各幾何答曰大方面三十六步小方面二十八步術曰立天元一為小方面自乘內減又云數為大方面自之為大方羃寄左又列小方面加入先云數亦為大方羃與寄左相消三乘方翻法開之得開方式得小方面加入先云數共得一千二百九十六為實一為廉平方開之得大方面合問今有直積二千六十五步只云較乘和得二千二百五十六步問長平各幾何答曰平三十五步長五十九步術曰立天元一為平自之為平羃式
