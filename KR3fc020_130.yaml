body:
  text: 今有梯田一段東闊四十六歩西闊八十六歩長一百二十五歩問爲田幾何答曰三十四畒三分七厘半術曰列東闊併入西闊半之得六十六歩爲停闊以長歩乘之得八千二百五十爲田積歩以畒法而一合問今有圭一段九十三歩闊三十四歩問爲田幾何答曰六畒五分八厘七毫半術曰列長九十三歩以闊三十四歩乘之折半得一千五百八十一爲田積歩以畒法而一合問今有圓田一段周八十四歩徑二十八歩問爲田幾何答曰二畒四分五厘術曰列周八十四歩以徑二十八歩乘之得二千三百五十二以四而一得五百八十八爲田積歩以畒法而一合問今有圓田一段不記周歩只云徑一十六歩問爲田幾何
