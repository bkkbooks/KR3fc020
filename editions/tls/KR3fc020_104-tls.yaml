body:
  text: 今有人借錢共還本利九百九十六貫六百五十六文只云每貫月利三十五文今九箇月一十八日問元借錢幾何答曰七百四十六貫術曰置共還錢爲實列九箇月六分六分者乃三十日除一十八日以三十五文乘之得數加本錢一貫共得一貫三百三十六文爲法實如法而一得元借錢數合問今有人借銀九十兩月利二兩只云今共還四千三百五十六兩經三箇月一十二日問本利幾何答曰本銀四千五十兩利銀三百六兩術曰置共還銀以九十兩乘之得三十九萬二千四十爲實三箇月四分以二兩因之得數加入九十兩共得九十六兩八錢爲法實如法而一得本銀反減共還銀數餘卽利銀也合問
  hash: sha256:704612ac62ddcae4c033659bf0b974b1137a51ffd7661948413789effef6d421
