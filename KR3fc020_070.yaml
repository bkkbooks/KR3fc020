body:
  text: 術曰列芝麻共數於上以三斤七分五厘乘之七分五厘者乃十二兩留數也合問今有小麥五碩九㪷二升每㪷磨麺六斤一十四兩問磨麺幾何答曰四百單七斤術曰列麥數於上以六斤八分七厘半乘之八分七厘半者乃十四兩留數合問今有菉荳三十二碩七㪷三升每㪷造粉五升六兩問造粉幾何答曰一千七百五十九斤三兩八錢術曰列荳數於上以五斤三分七厘半乘之三分七厘半者乃六兩留數也斤下分者身外加六爲兩合問今有甘草九千七百六十五斤一十兩每斤博絹一尺二分四厘問博絹幾何答曰一萬尺術曰列甘草共數斤下留兩於上以一尺單二分四厘乘之合問今有白檀四千八百八十二斤一十三兩每斤價錢四貫九十六文問錢幾何
