body:
  text: 互通然假碩爲鈞石之石則厪見干毛詩甫田疏引漢書食貨志而筭書早見又若玉鑑晥田之晥雖見于李籍九章音義而字書所無此書并同此三證也玉鑑雖亦三卷而門則爲二十四問則爲二百八十八較多于此書四門二十九問然以四字分類其體裁彼此無異且如商功修築方程正負之屬則又二書互見此四證也玉鑑如意混和弟一問據數知一秤爲十五斤適合此書之斤秤起率此五證也玉鑑鎖套吞容弟九問方五斜七八角田左右逢元弟六弟十三弟二十諸問有小平小長皆向無其術此書卷首明椉除段卽載平除長爲小長長除平爲小平之例其田畮形段弟十五問復載方五斜七八角田求積通術此六證也他如玉鑑或問歌彖弟四問與此書盈不足術弟七問又玉鑑果垛曡藏弟十四問與此書堆積還源弟十四問又玉鑑方程正負弟四問與此書方程正負弟五問其問題約略相同此七證也是此書眞朱氏原書佚而復出可憙之至矣同群中學人請鳩工以朝鮮原刻本縮版影刊并其末所載楊輝海島筭法一番亦爲坿列閒有魚豕悉仍
