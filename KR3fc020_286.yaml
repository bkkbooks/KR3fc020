body:
  text: 五之七而一得田方和問今有直積一千二十四步只云平除長長除平二數相併得四步二分半問長平各幾何答曰平一十六步長六十四步術曰立天元一為小平減云數餘為小長以小平乘之為小積與小積一算相消得開方式平方開之得小平二分五釐再立天元一為大長以乘小平為大平以大長乘之為大積式與元積相消得開方式平方開之得大長以小平乘之即大平合問今有直積四千九十六步只云長除平平除長二數相減餘三步七分半問長平各幾何答曰平三十二步長一百二十八步
