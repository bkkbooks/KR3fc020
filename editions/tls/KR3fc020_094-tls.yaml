body:
  text: 今有地八萬畒每六畒二分五厘直銀一斤問直銀幾何答曰一萬二千八百斤術曰列地畒數爲實以六畒二分五厘爲法實如法而一合問今有稻九萬斛每田一畒收稻五斛七㪷六升問田幾何答曰一百五十六頃二十五畒術田列稻數爲實以五斛七㪷六升爲法實如法而一合問異乘同除門入問今有錢九貫八百七十九文鑃米五碩三㪷四升只有米三十六碩九㪷問直錢幾何答曰六十八貫二百六十五文術曰列只有米數以九貫八百七十九文乘之爲實以五碩三㪷四升爲法除之市㕓日用而今有之合問今有米五十三㪷四升直錢九貫八百七十九文只有錢六十八貫二百六十
