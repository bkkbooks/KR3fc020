body:
  text: 和較者乃句股和較之省文已詳釋于玉鑑細艸之校演後記矣又如明程大位筭法統宗衰分章載有四六差分二八差分諸術雖本楊書所引指南筭法遞取幾分之幾爲率固亦古法之遺然是書差分均配弟七弟八兩問亦有四六二八諸差分皆以下一字折差與弟十問二八折三七折同例證以秦氏數學九章卷五賦役下弟二問均科緜稅下二等比中等六四折差科率求之而用四折者亦合又東原戴氏初從永樂大典中得劉嶶所注之九章因正負術有正無人負之負無人正之注謂無人爲無對也句未分曉誤以人字爲傳寫之譌悉改作入字是書明正負術下小字雙行案引九章注謂人作入非是妄改不始于戴氏在元時已然鄭注周禮有重差夕桀錢曉徵詹事疑夕桀爲互椉之譌見養新綠不知重差夕桀二名已雜出秦書卷四測望章此古名之厪見者是書求一穿韜雙據互換等名洎貴賤反率假令率亦皆近今早傳案假令率本劉嶶所注之九章盈不足章其貴賤反率亦九章粟米章謂爲其率反其率是已求一與秦書所載不同楊輝算法通變有
