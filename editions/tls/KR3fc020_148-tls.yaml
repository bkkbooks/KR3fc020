body:
  text: 二十四人乘之得四千六百八爲法實如法而一合問今有織匠一十二人九十六日織錦五百七十六匹欲令三十一人織二千七百九十匹問幾日畢答曰一百八十日術曰列二千七百九十匹以九十六日乘之又以十二人乘之得三百二十一萬四千八十爲實五百七十六匹以三十一人乘之得一萬七千八百五十六爲法實如法而一合問今有織匠一十二人九十六日織錦五百七十六匹今一百八十日織二千七百九十匹問織匠幾何答曰三十一人術曰列二千七百九十匹以九十六日乘之又以十二人乘之得三百二十一萬四千八十爲實一百八十日以五百七十六匹乘之得一十萬三千六百八十爲法實如法而一合問
