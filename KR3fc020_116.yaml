body:
  text: 答曰染羅八匹一丈二尺一寸半出羅二匹一丈三尺八寸半術曰置今有羅通尺內子得三百四十六尺以一丈五尺五寸乘之得五千三百六十三尺為實併出染羅得二十尺為法實如法而一得染羅以減三百四十六尺餘即出羅各以匹法約之合問今有客糴米六百五十三碩斗價一百二十八文雇車裝載每斗腳錢三十二文止於米內依元價折還問各幾何答曰客米五百二十二碩四斗腳米一百三十碩六斗術曰列米數於上以斗價乘之得八百三十五貫八百四十文為實併斗價腳錢共得一百六十文為法實如法而一得客米反減共米餘即腳米也合問今有人欲納粟八百八十九碩四斗七升半只
