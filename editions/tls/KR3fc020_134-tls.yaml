body:
  text: 術曰列弦長二十八歩加入矢濶一十四歩共得四十二歩以矢濶一十四歩乘之折半得二百九十四歩爲田積也以畒法二百四十歩約之合問今有錢田一段外周一百八歩內池方九歩問爲田幾何答曰三畒七分一厘二毫半術曰列外周自乘得一萬一千六百六十四以十二除之得九百七十二歩寄位又列池方九歩自乘得八十一以減寄位餘八百九十一爲田積歩以畒法二百四十歩約之合問今有方田一段自方八十四歩內有圓池周一百四十四歩問爲田幾何答曰二十二畒二分術曰列八十四歩自乘得七千五十六歩寄位又列池周歩自乘得二萬七百三十六以十二而一得一千七百二十八歩爲池積以減寄位餘五千三百二十八爲田積歩以畒法除之合問
