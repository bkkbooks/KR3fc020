body:
  text: 求一代乘除又有求一除等術是已穿韜者代乘代除也楊書各設三百題謂之穿除證以夏侯陽算經亦有身外添幾減幾并同此法蓋今之飛歸實穿韜之一種互換之名并見楊書續古摘竒及秦書卷六錢榖章或名互換或名互易其中有所謂雁翅乘與是書盈不足術維乘大略相似維乘之名九章秦書互見大氐諸率皆濫觴于宋元以前然則古法之班班可考尚賴是書復顯而為之佐證焉特朝鮮依元大德時趙氏原槧本重雕其田畝形段弟十四問梭田形圖騎版心割去上方魚尾與玉鑑首列四元自乘演段及五和五較三圖同病蓋宋元時凡書之有圖者多為蝴蝶裝如今之册頁作兩翼相合對形故雖占中縫于圖無礙非若今時書線裝反折致一圖而分陰陽面各半然是書之所重不在圖㚲仍其舊惟朝鮮本之版扇視近刻玉鑑細草本較廣今但鮮為縮狹影刊庶朱氏二書通為一律至款式一依朝鮮原刻其當時俗寫字如那作那臺作臺假或作假又釐畒之類不可枚舉亦不校改俾存原本之真慎之至也至于是書田之并見玉鑑或疑字書所
