body:
  text: 百四十步除之合問今有環田一段外周一百四十四步內周五十四步實徑一十五步問為古徽密率田各幾何答曰古法六畒一分八厘七毫半徽術五畒九分二步一百五十七分步之一百二十四密率五畒九分一步二十二分步之十一古法曰併內外周折半得九十九步以實徑一十五步乘之得一千四百八十五為田積步以畒法除之合問徽術曰內外周相減餘半之得四十五步又五十乘之以一百五十七而一得一十四步一百五十七分步之五十二為徽徑也通分內子得二千二百五十於上位併內外周而半之得九十九以乘上位得二十二萬二千七百五十以分毋一百五十七而一得一千四百一十八步一百五十七分步之一百二十
  hash: sha256:d9f491df6f392c87405ed505cf8da820107b0a814a5932f13475c81d9774b8ce
