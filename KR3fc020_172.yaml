body:
  text: 甲二百五十斤乙一百五十斤丙九十斤丁五十四斤術曰置甲率一千以六因之得六百為乙率又六因得三百六十為丙率又六因得二百一十六為丁率四位共併得二千一百七十六為法列共絲通兩以一千乘之得八百七十萬四千為實實如法而一得四千兩為甲絲六之得乙絲二千四百兩又六之得丙絲一千四百四十兩又六之得丁絲八百六十四兩各斤率約之合問今有官紬絲四千八百六十斤欲織西錦令甲乙丙丁戊已六局從上作二八差分之其錦每匹用絲二斤四兩問分絲織錦各幾何匹法三十二尺答曰絲一千三百一十七斤四百二十七分甲斤之一百四十一錦五百八十匹一丈五尺四百
