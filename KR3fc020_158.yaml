body:
  text: 術曰置綾九尺以三十六文乘之得三百二十四文爲實列綾羅尺數相減餘二尺爲法實如法而一得羅尺價內減不及餘卽綾尺價也合問今有良馬日行二百四十里駑馬日行一百五十里駑馬先行一十二日問良馬幾何日追及之答曰二十日術曰列一十二日以一百五十里乘之得一千八百里爲實列良駑馬日行里數相減餘九十里爲法實如法而一合問今有金銀一百鋌直錢一千七百二貫七百五十文只云金一鋌之價買銀七鋌二色兩價差七百五十文問金銀及兩價各幾何鋌率各五十兩答曰金二十八鋌三十七兩每兩價錢八百二十五文銀七十一鋌一十三兩每兩價錢一百二十五文
