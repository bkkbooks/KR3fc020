body:
  text: 羅綾空餘絹一百八十尺錢一十二貫六十文上法下實而一得絹尺價以乘中行絹就減中行錢餘卽綾尺價就乘右行綾五尺得四百二十五以減右下錢又以絹尺價乘右行絹六尺得四百二文又減右下錢餘三百九十二文以四約之得羅尺價合問今有二馬三牛四羊價各不滿一萬若馬添牛一牛添羊一羊添馬一各滿一萬問三色各一價錢幾何答曰馬三千六百文牛二千八百文羊一千六百文術曰以右上馬二遍因左行以依圖右行直減之馬空牛負一布筭羊正八錢正一萬又以中行牛三遍因左行以中行異減同加左行馬牛位空餘羊二十五錢四萬上法下實而一得羊價中行錢內減一羊價餘以三
