body:
  text: 一縱十横百立千僵千十相望萬百相當滿六已上五在上方六不積聚五不單張言十自過不滿自當若明此訣可習九章大數之類凡數之大者天莫能葢地莫能載其數不能極故謂之大數也一十百千萬十萬百萬千萬萬萬曰億萬萬億曰兆如前呼之一億十億百億千億萬億十萬億百萬億千萬億萬萬億曰兆是也後倣此㪅不繁說萬萬兆曰京萬萬京曰陔萬萬陔曰秭萬萬秭曰壤萬萬壤曰溝萬萬溝曰澗萬萬澗曰正萬萬正曰載萬萬載曰極萬萬極曰恒河沙萬萬恒河沙曰阿僧祇萬萬阿僧祗曰那由他萬萬那由他曰不可思議萬萬不可思議曰無量數小數之類凡數之小者視之無形取之無像數亦不能盡故謂之小數也一分厘毫絲忽微纎沙萬萬塵曰沙萬萬埃曰塵萬萬渺曰埃萬萬漠曰渺萬萬糢糊曰漠萬萬逡廵曰糢糊萬萬須臾曰逡廵萬萬瞬息曰須臾萬萬彈指曰瞬息萬萬剎那曰彈指萬萬六德曰剎那萬萬虛曰六德萬萬空曰虛萬萬淸曰空萬萬淨曰淸千萬淨百
