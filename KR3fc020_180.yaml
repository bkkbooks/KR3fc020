body:
  text: 半五百七十戶共七萬八千二百七十五斗二升半戊每戶一十二碩一斗三升二合半五百八十四戶共七萬八百五十三斗八升已每戶一十碩五斗三升二合半六百七十六戶共七萬一千一百九十九斗七升庚每戶八碩九斗三升二合半八百五十戶共七萬五千九百二十六斗二升半辛每戶七碩三斗三升二合半九百二十戶共六萬七千四百五十九斗壬每戶五碩七斗三升二合半一千六百八戶共九萬二千一百七十八斗六升術曰列甲等戶三百六十四八之得二千九百一十二列乙等戶三百九十六七之得二千七百七十二列丙等戶四百三十二六之得二千五百九十二列丁等戶五百七十五之得二千八百五十列戊等戶五百八十四四之得二千三百三十六列已等戶六百七十六三之得二千二十八列庚等戶八百五十倍之得一千七百列辛等戶九百二十以一因之得九百二十
