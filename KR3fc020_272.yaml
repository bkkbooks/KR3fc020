body:
  text: 術曰列全步通分內子得一千八百七十五以十二乘之得二萬二千五百又分毋四再自乘得六十四乘之得一百四十四萬為實以一為廉平方開之得一千二百又分毋自乘得十六而一合問今有直田八畒五分五釐只云長平和得九十二步問長平各幾何答曰平三十八步長五十四步術曰立天元一為平以減云數餘為長用平乘起為積寄左列畒通步與寄左相消得開方式平方開之得平以減和步即長和問按此以古法演之和步自乘得八千四百六十四乃是曰段直積一段較羃也列積四之得八千二百八減之餘有較羃二百五十六為實以一為廉平方開之得較一十六步加和半之得長長內減較即平也今以天元演之明源活法省功數倍假立一算於太極之下如意求之得方廉隅從正負之段乃演其處積相消相長而脫其真積也子故於逐問備立細草圈其縱橫明其正負使學者粲然易曉也今有直田五畒八十八步只云長平併之得七
