body:
  text: 升為法實如法而一按元酒三斗二升倍之內減三斗四升餘三斗又倍之又減三斗四升餘二斗六升又倍又減三斗四升餘一斗八升又倍又減三斗四升外多二升故曰有餘令之三斗倍之減二斗四升餘二斗六升又倍又減三斗四升餘一斗八升又倍又減三斗四升餘二升又倍得四升反減三斗四升外少三斗故曰不足合問今有松竹並生只云松初日長五尺竹長二尺松日自半竹日自倍問松竹幾何日而長等答曰二日九分日之二各長七尺七寸九分寸之七術曰假令二日不足一尺五寸令之三日有餘五尺二寸五分乃以盈不足術求之依圖維乘上二位併得一丈五尺為布算實併盈不足得六尺七寸半為法實如法而一不滿法者各以七寸半約之得日數也求長者各以第三日所長以日分子乘之如日分毋而一各得日分子之長又各增二日長數得松竹等長也按此二日松長七尺五寸竹長六尺乃竹不及松長一尺五寸故曰不足令之三日松長
