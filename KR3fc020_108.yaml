body:
  text: 今有客持珍珠三千七百六十顆舶司稅之四十分取三今稅訖三百顆貼與客錢一十貫三百五十文欲買一百五十顆問與錢幾何答曰八十六貫二百五十文術曰列客持珠數三之四十而一得二百八十二顆乃合稅之珠數以減三百顆餘一十八為法列一百五十顆以貼與客錢乘之為實實如法而一即得合問今有客持胡椒兩務稅之先稅十分取一次稅三十分取一今共稅訖三十五斤一兩六錢問客元持椒幾何答曰二百七十斤術曰列共稅訖椒數通兩內子得五百六十一兩六錢十之為實以一兩三錢為法實如法而一為法之數以十兩為率兩次官合稅一兩三錢故為法也以斤率十六約之今市舶司有之合問今有客持降真兩務稅之先稅三十分取一次稅五十分取三餘有三千斤問客元持降真幾何
  hash: sha256:3643e57271ddc71e2d0474dc6d098b80fababe096352a323743a263b582b8c6f
