body:
  text: 二毫問直銀幾何答曰一十五兩一錢六分三釐二毫術曰列五斤身外加六通兩內子七得八十七兩以二十四乘之得數加入一十八銖共得二千一百六銖於上以七釐二毫乘之合問今有官桂一百八十九裹每兩價錢八十七文問計錢幾何裹法二斤四兩答曰五百九十一貫九百四十八文術曰列共裹以裹法三十六兩乘之得六千八百四兩於上以兩價八十七文乘之即得合前問今有粳米八斗七升四合每斗換糯米九升一合問糯米幾何答曰七斗九升五合三勺四抄術曰列粳米共數於上以九升一合乘之即得合前問今有芝麻六碩八斗四升每斗壓油三斤一十二兩問壓油幾何答曰二百五十六斤半
