body:
  text: 無案劉嶶所注之九章本亦作李籍音義謂當作宛字之誤也蓋去爾雅宛中宛邱注中央隆高之義今刻從李所改楊輝筭法作畹攷説文畹下注田三十畮也與中央隆高亦迥別夏侯陽筭經丸田注形如覈半彈丸術曰徑椉周四而一與此合丸音近畹形近似雖不見于字書殆如明邢雲路古今律秝攷羃積之羃別作同爲筭書習用字且鶡冠子天權篇䠺蜚垂之䠺字字亦字書所無無可疑義又是書遆減遆因之遆字凡數見遆在集韻十二齊下注田黎切姓也訓與術文不協據術義當爲遞集韻遞或作递想因递遆字形相似而譌抑遞遆亦筭書生筭假借字無有确據未骰以臆見率改致後之學者滋惑金序謂㪅以楊輝望海島一章添入卷尾案楊輝筭法卷未所載海島題解蓋本諸劉嶶海島筭經彼中未見劉書不知所本遂以爲出自楊輝其前題今有望海島立二表各五丈下小字雙行注云丈當作歩此亦彼中所校據楊書及劉嶶本經并云高三丈蓋彼中鈔本誤三爲五因不合數轉疑不誤之丈字爲誤耳又楊書及劉嶶本經并于術曰
  hash: sha256:3e744e01bf2d42d96e7fb7375b90a08f3fa10b9a08559092fb277403ba7ab7f8
