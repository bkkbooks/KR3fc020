body:
  text: 得開立方開之得立圓徑一十方式六尺加八尺得立方面減二尺為平圓徑倍立方面即平方面合問今有立方立圓平方古圓田徽圓田各一共積三萬三千六百二十二尺二百分尺之三十七只云立方面不及立圓徑四尺多如徽圓徑三尺立圓徑如平方面三分之一古圓周與立方面適等問五事各幾何答曰立方面二十四尺立圓徑二十八尺平方面八十四尺古圓周二十四尺徽圓徑二十一尺術曰立天元一為立方面亦古圓周加不及四尺為立圓徑再自乘九因為十六段積以二百二十五乘之為三千六百段立圓積又列立圓徑三之為平方面自之為平方
