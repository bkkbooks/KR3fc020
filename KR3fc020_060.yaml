body:
  text: 今有麻八百九十二稱每稱價錢七百文問計錢幾何答曰六百二十四貫四百文今有布六百三十四尺每尺價錢八十文問計錢幾何答曰五十貫七百二十文今有馬四百二十五匹每匹價錢九十貫問計錢幾何答曰三萬八千二百五十貫術曰列物數在上各以價錢從上因之即得合前問身外加法門十一問算中加法最堪誇言十之時就位加但遇呼如身下列君從法式定無差今有米六碩八㪷四升每㪷價錢一百一十文問計錢幾何答曰七貫五百二十四文今有羅三十四尺六寸每尺價錢一百二十文問計錢幾何答曰四貫一百五十二文
