body:
  text: 銖斤價一百六十一文其七石三鈞三兩二十銖斤價一百六十文術曰列錢以三百八十四乘之得九千六百萬爲實列桂花通銖得五十九萬八千四百九十二爲法實如法而一得一百六十文爲賤斤價內加一文卽貴斤價不盡二十四萬一千二百八十反減下法餘三十五萬七千二百一十二以石鈞兩銖法除之得七石三鈞三兩二十銖爲賤數其不盡二十四萬一千二百八十以石秤斤兩銖法除之得五石一秤一十三斤五兩八銖卽貴數合問今有錢三十八貫四百文買木香一石二鈞一十四斤一十四兩八銖欲其貫賤兩率問各幾何答曰其二鈞一斤四兩兩價一十三文其一石一十三斤一十兩八銖兩價一十二文
  hash: sha256:204b73aede4d8ab91818b576a3a46cb7adf33f2e354725ff7733b98e95fd5129
