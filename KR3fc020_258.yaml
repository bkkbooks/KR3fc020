body:
  text: 紅錦九十三文一百一十九分文之三十三青錦七十三文一百一十九分文之一十三黃錦六十五文一百一十九分文之六十五術曰以右上紅四遍乘左行仍依圖用右行異減同加負毋人負左布筭上空青負一黃正二十四錢正一千五百又以中行五遍乘左行亦以中行直減之餘黃錦一百一十九尺錢七千八百文上法下實而一得黃錦尺價通分內子得七千八百寄左又以一百一十九通中行錢得三萬五千七百加入寄左共得四萬三千五百以五而一得八千七百以分毋約之得青錦尺價又以分毋通右行錢又加入八千七百共得四萬四千四百以四而一得一萬一千一百以分毋約之得紅錦尺價也合問今有人賣綾三羅五以買十二絹餘錢一萬賣綾四絹四以買七羅適足賣羅二絹四以買六綾少錢一萬問綾羅絹賣各幾何
