body:
  text: 徽密三積各幾何答曰古積二千九百九十七尺徽積二千八百六十三尺一百五十七分尺之五十九密積二千八百六十尺二十二分尺之一十七古法曰列下周五丈四尺自乘得二千九百一十六尺以高三丈七尺乘之得一十萬七千八百九十二尺為實以三十六為法實如法而一得古積合問徽術曰下周自乘又高乘之又以二十五乘之得二百六十九萬七千三百為實以九百四十二為法實如法而一為法數者乃圓法十二乘半徽周七十八分半故為法也不滿法者各以六約之得徽積合問密術曰下周自乘又高乘之又以七因之得七十五萬五千二百四十四為實以二百六十四為法實如法而一為法之數乃圓法十二乘密周二十二故為法不滿法者各以十二約之合問
  hash: sha256:bef89a7e37d61df82c4c381460077913adc618adaee3b220298a35ce81786c11
