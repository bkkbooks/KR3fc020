body:
  text: 五斜七云者約率也實則斜率七其二方一斜之和為一十七又七分之一通分內子得一百二十為七段二方一斜之和率為法之數當以七段和率一百二十乘田濶以七段斜率四十九除之為田長各以二十約之得和率六斜率二箇四分半解見四元玉鑑鎖套吞容弟九問細草下差分均配弟四術列共分錢內虛加一貫八百為實併各人分率得一十一為法案乙如甲五分之三卻多如丙錢一貫八百今既虛加多丙錢一貫八百則是丙與乙等各為三分甲獨為五分故并甲乙丙三人分率得一十一分下卷開方釋鎖弟十五術夾注別得一百九長內減一百二十二平餘數案此其率者以上文夾注和二百八箇即二百八平二百八長也較六百一十六箇即六百一十六長內減六百一十六平也差七百一十五箇即一千四百三十平內減七百一十五長也三數相并得一千二十二平一百九長之共數于上
  hash: sha256:dfb0804dcf8dfc23c0e379ce2bb162f9a13818eba6efd765c338dcb375bde29b
