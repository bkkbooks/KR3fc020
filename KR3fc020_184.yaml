body:
  text: 戶問三鄉九等各粟幾何答曰上鄉二百二十八戶共五千二百五十一碩四斗八升上等每戶二十六碩五十六戶共一千四百五十六碩中等每戶二十三碩四斗七十四戶共一千七百三十一碩六斗下等每戶二十一碩六升九十八戶共二千六十三碩八斗八升中鄉三百六十二戶共三千六百四十五碩二斗上等每戶一十三碩八十二戶共一千六十六碩中等每戶一十碩四斗一百二十戶共一千二百四十八碩下等每戶八碩三斗二升一百六十戶共一千三百三十一碩二斗下鄉四百四十七戶共一千九百七十三碩四斗上等每戶六碩五斗九十五戶共六百一十七碩五斗中等每戶四碩五斗五升一百七十
