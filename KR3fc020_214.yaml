body:
  text: 術曰列木香通銖得七萬四千八百四十為法列錢以二十四乘之得九十二萬一千六百為實實如法而一得一十二文為賤兩價內加一文即貴兩價不盡二萬三千五百二十反減下法餘五萬一千三百二十以石斤兩銖法除之得一石一十三斤一十兩八銖為賤數其不盡二萬三千五百二十以鈞斤兩銖法除之得二鈞一斤四兩即貴數合問今有錢二十八貫六百八十文買黃蠟二石三鈞一稱三斤六兩八銖欲其貴賤銖率之問各幾何答曰其三鈞一十斤二兩一十六銖四銖直錢一文其二石八斤三兩一十六銖五銖直錢一文術曰列蠟通銖得一十三萬三千七百八十四為實以錢為法實如法而一得四銖直錢一文乃貴物也內加一銖即賤物也
  hash: sha256:a4962143157522eecbf24152dda810247e8b9863a4f7ff15c3ab7bea678b5eee
