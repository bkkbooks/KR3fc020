body:
  text: 甲二千一百九十引乙一千二百九十引丙一千一百七十引術曰各列元引以止查鹽數乘之甲得一千六百九十七萬二千五百乙得九百九十九萬七千五百丙得九百六萬七千五百各為列實併各人元引得七千七百五十為法各實如法而一合問今有銀一稱一斤十兩令甲乙丙從上作折半差分之問各得幾何答曰甲一百五十二兩乙七十六兩丙三十八兩術曰置銀通兩內子得二百六十六兩為實併各人分數得七為法實如法而一得丙銀倍之為乙銀又倍即甲銀合問今有甲乙丙丁分絲五百四十四斤從上作四六差分之問各得幾何答曰
  hash: sha256:be13c09fdc894329f4d0f5cfd25163e6072e60fd1d41c9ea145d75797e44388d
