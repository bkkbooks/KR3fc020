body:
  text: 餘二百七十八之得貴物數其不盡五百七十九之得賤物數合問今有錢一十六貫五百文買漆一石三鈞一秤四斤五兩六銖欲其貴賤石率之問各幾何答曰其一石三鈞四兩一十八銖石價八千六百三十四文其一秤四斤一十二銖石價八千六百三十三文術曰列漆通銖得八萬八千六十二爲法列錢以四萬六千八十乘之得七億六千三十二萬爲實實如法而一得八千六百三十二文爲賤石價加一文卽貴石價不盡八萬七百五十四反減下法餘七千三百八以秤斤銖法除之得一秤四斤一十二銖爲賤數其不盡八萬七百五十四以石鈞兩銖法除之得貴數合問今有錢二十五貫三百文買絲二石二鈞一秤三斤四兩八銖欲其貴賤鈞率
  hash: sha256:2fc87c8e1b480f2307344add707be7bc0c4a8e893ec72e90dc520a03f98f3a53
