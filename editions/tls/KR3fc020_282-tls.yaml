body:
  text: 答曰平五十六歩長八十四歩術曰依母互乘子得長七十二箇平二十四圖布筭箇和四十八箇較六十四箇分母相乘得九十六以乘不及得二百二十四歩别得八長内減八平餘八較今從省八約之得二十八歩爲一較卽一長内減一平立天元一爲平加入二十八歩爲長用平乘起爲積寄左列畒以二百四十乘之與寄左數相消得開方式平方開之得平以平除積得長也今有圓田一段内有方池容邊而占之外餘地八畒六十五歩七分半只云四弧矢各濶一十三歩問圓徑池方各幾何答曰圓徑九十一歩池方六十五歩術曰立天元一爲圓徑内減倍之云數餘爲池方面自之就分四之爲四
