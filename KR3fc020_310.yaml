body:
  text: 積以三千六百乘之為三千六百段平方積又列立方面减三尺為徽圓徑也也自之又周一百五十七乘之為二百段積以十八乘之為三千六百又列古圓周即立方面自之段徽圓積為十二段積以三百乘之為三千六百段古圓積又列立方面再自乘為一段積以三千六百乘之為三千六百段立方積寄左列五位併之得積通分內子以十八乘之與立方開之寄左相消得開方式得立方面古圓周等數也加四尺得立圓徑三之為平方面又列立方面減三尺即徽圓徑也合問新編算學啓蒙卷終
