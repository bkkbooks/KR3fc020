body:
  text: 十八爲法實如法而一得一兩不滿法者命之合問今有田濶一十三分歩之九長一十八分歩之十一問爲田幾何答曰二十六分歩之十一術曰依列分毋相乘得二百三十四圖布筭爲法分子相乘得九十九爲實實如法而一不滿法者各九約之合問今有錢三百四十六貫八百文買絲二百九十八斤問斤價幾何答曰一貫一百六十三文一百四十九分文之一百一十三術曰列錢數於上爲實以絲數爲法實如法而一不滿法者各半之合問今有絲二百九十八斤斤價一貫一百六十三文一百四十九分文之一百一十三問直錢幾何答曰三百四十六貫八百文術曰列共絲於上斤價通分內子得一十七萬三千四百以乘上位得五千一百六
