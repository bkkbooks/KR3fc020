body:
  text: 坿釋凡魚豕之譌已見識誤矣其或術文不顯茍非釋明無以探源故復坿釋干次上卷庫務解稅弟十一術以不稅者二十九四十七相椉案先稅三十分取一以子減母餘不稅者二十九次稅五十分取三亦以子減母餘不稅者四十七折變互差弟二術列欠錢數五之爲實以二十爲法案爲法之數各以銀一兩錢一貫爲適等之率銀一兩折錢五貫合錢一貫共得六貫因欠錢數五之故亦五通六貫得三十爲法又術省椉較捷折變互差弟三術列欠錢數五之爲實以五十五爲法案此與弟二術同唯弟二問銀錢適等此則二分銀一分錢故以銀二兩折錢十貫合錢一貫共得一十一貫亦五通得五十五爲法又術較捷折變互差弟八術列共粟以米六升椉之爲實以二㪷三升五合爲法案共粟旣以米六升椉之是六升爲分母矣故以分母通粟一㪷得粟六㪷副置上中下三位各以
