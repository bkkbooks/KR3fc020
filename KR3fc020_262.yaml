body:
  text: 答曰句二十七歩股三十六歩弦四十五歩術曰前分毋十八乘五歩得九百七十二乃是九箇句弦和四箇股弦和又後分毋乘餘數得七百五十六是三句弦和減十二股弦和數如方程正負入之依圖以右行三次異減同加左行布筭左中得股弦和四十箇左下得三千二百四十歩上法下實而一得股弦和八十一歩就以十二乘之得數以減右下七百五十六餘二百一十六以三約之得句弦和七十二歩也以股弦和乘而倍之得一萬一千六百六十四爲實乃弦和和羃也以一爲廉平方開之得一百八卽弦和和副置上位減股弦和卽句下位減句弦和卽股又句弦和內減句餘卽弦合同今有直田句弦和取七分之四股弦和取七分之六二數相減餘二十二歩又股弦取三分之一不及句弦
  hash: sha256:e6a88f6078e3ad433cfdf8c08f9cd4d71fa11f653dc329990fa255ef9eb9df7c
