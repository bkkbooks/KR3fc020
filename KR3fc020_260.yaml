body:
  text: 答曰綾二千八百羅二千絹七百術曰以右行直減中行同減異加依正依圖負術入之却三之又以右行減布算之綾空餘羅正四十一絹負六十錢正四萬又以右行二度直減左行綾空又以中行羅四十一遍乘左行仍以中行十二度減之綾羅空餘絹一百錢七萬上法下實而一得絹價以乘中行絹六十得數加入四萬共得八萬二千以四十一除之得羅價以絹價乘右行絹十二得數加入一萬共得一萬八千四百內減五羅價一萬餘以三約之得綾價合問今有直田句弦和取二分之一股弦和取九分之二共得五十四步又句弦和取六分之一減股弦和三分之二餘有四十二步問句股弦各幾何
