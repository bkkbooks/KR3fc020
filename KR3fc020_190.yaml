body:
  text: 答曰堅二百七十尺壤四百五十尺術曰列三百六十尺以築堅三尺因之得一千八十尺以穿地四尺除之得二百七十尺爲堅也又列三百六十尺以壤五尺因之得一千八百尺亦以穿地四尺除之得壤也合問今有城高四丈六尺下廣三丈六尺上廣一丈八尺袤六十四里問積幾何答曰一億四千三百七萬八千四百尺術曰併上下廣而半之得二十七尺上下停也以高四丈六尺乘之得一千二百四十二尺於上位又列袤六十四里以尺里法一千八百通之得一十一萬五千二百尺以乘上位得城積尺也合問今有牆下廣四尺上廣三尺高九尺袤二里五十歩問積幾何答曰一十二萬一千二百七十五尺術曰列下廣併入上廣折半得三尺五寸
