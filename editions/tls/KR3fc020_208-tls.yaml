body:
  text: 之問各幾何答曰其二石二斤五兩八銖鈞價二貫三百八十五文其二鈞一秤一十五兩鈞價二貫三百八十四文術曰列錢以一萬一千五百二十乘之得二億九千一百四十五萬六千爲實列絲通銖得一十二萬二千二百一十六爲法實如法而一得二千三百八十四爲賤鈞價內加一文卽貴鈞價不盡九萬三千五十六反減下法餘二萬九千一百六十以鈞秤兩銖法除之得二鈞一秤一十五兩爲賤數其不盡九萬三千五十六以石斤兩銖法除之得二石二斤五兩八銖卽貴數合問今有錢一百貫買胡椒二十七石一鈞一秤三斤一十二兩一十八銖欲其貴賤秤率之問得幾何答曰
