body:
  text: 今有鹽丁九人七日煎鹽五十五引五十斤今增一百八十五人煎四十八日問得鹽幾何答曰八千一百四十八引術曰列一百八十五人答入九人得一百九十四人以四十八日乘之又以五十五引一分二厘半乘之引下分者乃四百斤約之得五十一萬三千三百二十四爲實列九人以七日乘之得六十三爲法實如法而一合問今有船載物裝重五百斤行路八十里脚錢一百五十文今載八萬六千斤欲行三千四百里問與脚錢幾何答曰一千九十六貫五百文術曰列八萬六千斤以三千四百里乘之又以一百五十文乘之得四百三十八億六千萬爲實又列五百斤以八十里乘之得四萬爲法實如法而一合問雙據互換之法學者少識所乘所除之理前問織錦三術返復還源傋矣此問與煎鹽義同而今有之及雇車行道相類也故引草證使習筭者無疑矣今有黍一碩五㪷變米八㪷四升每米四㪷五
