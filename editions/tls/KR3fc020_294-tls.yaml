body:
  text: 面各幾何答曰大方面八十四歩中方面六十八歩小方面五十二歩術曰列云數三約之得中方面六十八歩立天元一爲較加入中方面爲大方面自之爲大方積又列較歩減中方面餘爲小方面自之爲小方積又列中方面自乘爲中方積三位併得寄左列積與寄左相消得開方數式平方開之得較一十六歩加中方面得大方面中方面減較卽小方面也今有古徽宻率圓田各一段共積五十六百七十一歩五十分歩之十三只云古徑不及宻徑七歩宻徑不及徽徑七歩問三圓徑各幾何答曰古徑四十二歩宻徑四十九歩
