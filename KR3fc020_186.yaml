body:
  text: 二戶共七百八十二碩六㪷下等每戶三碩一㪷八升半一百八十戶共五百七十三碩三㪷術曰列配粟以一之得一十億八千七百萬八千為實併尤等戶分數得四百一十八萬八百為法實如法而一得上鄉上等每戶之數折半得中鄉上等每戶之數又折半得下鄉上等每戶之數上鄉遆用九因中鄉遆用八因下鄉遆用七因各得逐等每戶之數也草曰先列上鄉上等五十六戶以一萬乘之得五十六萬又列中等七十四戶以九千乘之得六十六萬六千又列下等九千八戶以八千一百乘之得七十九萬三千八百又列中鄉上等八十二戶以五千乘之得四十一萬又列中等一百二十戶以四千乘之得四十八萬又列下等一百六十戶以三千二百乘之得五十一萬二千又列下鄉上等九十五戶以二千五百乘之得二十三萬七千五百又列中等一百
  hash: sha256:875d7cb447a1a94f28eff3ccd064fdb4182413c4232fe835633aac3a738be74b
