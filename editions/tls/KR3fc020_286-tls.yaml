body:
  text: 五之七而一得田方和問今有直積一千二十四歩只云平除長長除平二數相併得四歩二分半問長平各幾何答曰平一十六歩長六十四歩術曰立天元一爲小平減云數餘爲小長以小平乘之爲小積與小積一筭相消得開方式平方開之得小平二分五釐再立天元一爲大長以乘小平爲大平以大長乘之爲大積式與元積相消得開方式平方開之得大長以小平乘之卽大平合問今有直積四千九十六歩只云長除平平除長二數相減餘三歩七分半問長平各幾何答曰平三十二歩長一百二十八歩
