body:
  text: 加入云數為長羃又以平羃乘之為積羃也寄左列積自之與寄左相消散乘方開之得平侍開方式以平除積為長也今有直田長平相乘為實平方開之得數加長平和得一百二十九步只云差三十九步問長平各幾何答曰平二十五步長六十四步術曰立天元一為和以減先云餘為開方數自之就分四之為四段直積又加差寄左列和自之為羃得式和羃與寄左相消得平方開之得和八十九開方數式步減差半之得平加差半之即長合問今有大中小方田各一段共積一萬四千三百八十四步只云方方較等其三方面相和得二百四步問三方
  hash: sha256:97dbabc18da2998108bd336730b78428045b42b4b0f1e6f33cfc615b3dd50b9f
