body:
  text: 術曰列椒數斤下留兩得六十三斤二分半於上以斤價三百八十文乘之合問今有沈香九斤一十二兩每斤價錢四貫五百文問計錢幾何答曰四十三貫八百七十五文術曰列香數斤下留兩得九斤七分五厘於上以斤價四貫五百文乘之合問今有綿子二十三斤六兩每兩價錢五十四文問計錢幾何答曰二十貫一百九十六文術曰列綿子二十三斤身外加六通兩答入六兩共得三百七十四兩於上以兩價五十四文乘之合問今有茴香五稱八斤四兩每斤價錢六十八文問計錢幾何答曰五貫六百六十一文術曰列五稱身外加五通斤答入八斤四兩斤下兩者留之共得八十三斤二分半於上以斤價六十八文乘之合問今有片腦五斤七兩一十八銖每銖直銀七厘
