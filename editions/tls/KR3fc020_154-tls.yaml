body:
  text: 今有錢二十九貫六百八十七文五分共買宻蠟一百四十六斤六兩只云蠟斤價三百八十文宻斤價六十八文問各幾何答曰宻八十三斤二兩蠟六十三斤四兩術曰列宻蠟共數斤下留兩以蠟斤價乘之得五十五貫六百二十二文五分內減今有錢餘二十五貫九百三十五文爲實列宻蠟斤價相減餘三百一十二文爲法實如法而一得宻斤下分者身外價六爲兩反減共數餘卽蠟也合問今有粟米一十七碩三升直錢一十九貫四百三文之云粟㪷價七十五文米㪷價一百六十四文問各幾何答曰米七碩四㪷五升粟九碩五㪷八升術曰列粟米共數以粟㪷價乘之得一十
  hash: sha256:430fb7be4e785afcfcb6dbe27f5fa7c248077a4764b8ae28abc1b0ad4fba2e95
