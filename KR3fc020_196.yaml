body:
  text: 十四歩又以尺法六因之得五千八百四十四尺以乘上位得三十八萬五千七百四尺爲堤積也以人功三百六十四尺爲法實如法而一不滿法者各以四約之卽得合問今有方堡壔自方二十四尺高二丈一尺問積尺幾何答曰一萬二千九十六尺術曰列方二十四尺自乘得五百七十六尺又以高二丈一尺乘之得一萬二千九十六尺爲積也合問今有圓堡壔周三丈七尺高一丈四尺問積尺幾何答曰一千五百九十七尺六分尺之一術曰列周三丈七尺自乘得一千三百六十九尺又以高一丈四尺乘之得一萬九千一百六十六尺以圓法十二而一不滿法者各半之合問今有方亭臺一所上方二丈八尺下方三丈二尺高四丈六尺問積尺幾何
  hash: sha256:3b99b5a34d4f5f1a7be54c1f13d70785f3e69fe35182123b9c7cd8075c908d3d
