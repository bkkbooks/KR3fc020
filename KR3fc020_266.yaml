body:
  text: 開方釋鎖門三十四問今有平方羃四千九十六步問為方面幾何答曰六十四步術曰列羃四千九十六步為實借一算於六步之下名曰廉法常超一位至百步下止乃上商六十於廉法之上實數之下亦置六百名曰方法乃命上商除實三千六百實餘四百九十六倍方法得一千二百一退得一百二十廉法再退又上商四步於廉法之上實數之下亦置四步方法得一百二十四乃命上商除實恰書合問今有立方羃一萬七千五百七十六尺問為方面幾何答曰二十六尺術曰列羃一萬七千五百七十六尺為實借一算於六尺之下名曰隅法常超二位約實至千尺下止乃上商二十以隅法因上商二十得二千於隅法之上方法之下名曰廉法又廉法因上商二十得四千於廉法之上實數之下名曰方法乃命上商
