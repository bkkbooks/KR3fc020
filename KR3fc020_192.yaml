body:
  text: 乃上下停濶也以高九尺乘之得三十一尺五寸寄位又列袤二里以三百六十步通之內子得七百七十步以五尺因之得三千八百五十尺以乘寄位得牆積尺也合問今有垣積六萬八千八百八十六尺只云上廣二尺二寸下廣三尺八寸袤一里一百四十五步問高幾何答曰八尺六寸術曰置積為實列袤一里以古法三百步通之內子得四百四十五步又以步尺法六因之得二千六百七十尺為法實如法而一得二十五尺八寸又併上下廣折半得三尺除之即高合問今要開河下廣一丈八尺七寸上廣二丈六尺三寸湥一丈五尺袤三十六里二百八十五步春程人功五百九十八尺除出土功七分之二問用徒幾何答曰五萬二千五百五十一人五百九十八分人之四百七十七
  hash: sha256:8e4a2ad0303ebc0e1eec4a186db18470de66ead0d3d819b4dd882bbe2568537b
