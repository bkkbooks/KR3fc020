body:
  text: 加入云數爲長羃又以平羃乘之爲積羃也寄左列積自之與寄左相消散乘方開之得平侍開方式以平除積爲長也今有直田長平相乘爲實平方開之得數加長平和得一百二十九歩只云差三十九歩問長平各幾何答曰平二十五歩長六十四歩術曰立天元一爲和以減先云餘爲開方數自之就分四之爲四段直積又加差寄左列和自之爲羃得式和羃與寄左相消得平方開之得和八十九開方數式歩減差半之得平加差半之卽長合問今有大中小方田各一段共積一萬四千三百八十四歩只云方方較等其三方面相和得二百四歩問三方
