body:
  text: 微徑五十六歩術曰立天元一爲古徑自之三因爲四段古積就以七百乘之爲二千八百段古積又列古徑加七歩爲宻率徑自之又二十二乘之爲二十八段宻率就以一百乘爲二千八百段密積也又列宻徑加七歩爲微徑自之又以一百五十七乘之爲二百段微術就以十四乘三位之亦爲二千八百段徽積也併之寄位列積五千六百七十一歩通分內子以五十六乘之與寄位相消得開平方開之得古徑加七方數式得宻徑又加七得微徑也今有圓田一段周爲實平方開之得數加入圓積共得一百一十四歩問周徑各幾何答曰周三十六歩徑一十二歩
