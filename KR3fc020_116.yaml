body:
  text: 答曰染羅八匹一丈二尺一寸半出羅二匹一丈三尺八寸半術曰置今有羅通尺內子得三百四十六尺以一丈五尺五寸乘之得五千三百六十三尺爲實併出染羅得二十尺爲法實如法而一得染羅以減三百四十六尺餘卽出羅各以匹法約之合問今有客糴米六百五十三碩㪷價一百二十八文雇車裝載每㪷脚錢三十二文止於米內依元價折還問各幾何答曰客米五百二十二碩四㪷腳米一百三十碩六㪷術曰列米數於上以㪷價乘之得八百三十五貫八百四十文爲實併㪷價脚錢共得一百六十文爲法實如法而一得客米反減共米餘卽腳米也合問今有人欲納粟八百八十九碩四㪷七升半只
