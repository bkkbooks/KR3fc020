body:
  text: 七十二戶以一千七百五十乘之得三十萬一千又列下等一百八十戶以一千二百二十五乘之得二十二萬五百九位共併得四百一十八萬八百爲法列配粟一萬八百七十碩八升以一萬乘之得一十億八千七百萬八千爲實實如法而一得二十六碩乃上鄉上等每戶之數九因得二十三碩四㪷乃中等每戶之數又九因得二十一碩六升乃下等每戶之數又列上鄉上等每戶粟二十六碩折半得一十三碩乃中鄉上等每戶之數八因得一十碩四㪷乃中等每戶之數又八因得八碩三㪷二升乃下等每戶之數又列中鄉上等每戶粟一十三碩折半得六碩五㪷乃下鄉上等每戶之數七因得四碩五㪷五升乃中等每戶之數又七因得三碩一㪷八升五合乃下等每戶之數各以每戶之率乘其各等之戶卽得共粟合問商功修築門十三問今有穿地積三百六十尺問爲堅壤各幾何
