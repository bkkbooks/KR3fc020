body:
  text: 術曰列銀七鋌以鋌率通之得三百五十兩以差七百五十乘之得二十六萬二千五百為實以三百兩為法實如法而一得金兩價也為法之數乃銀三百五十兩內減金五十而餘數也內減差即銀兩價又列一百鋌通兩以金兩價乘之得數內減直錢餘二千六百七十二貫二百五十文為差實以差七百五十文為法除之得銀兩數反減五千兩餘即金兩數也各以鋌率約之合問今有油一稱二斤三兩半欲點醮燈只云四盞用油三兩三甌用油五兩須令盞數倍之甌數問甌盞及油各幾何答曰甌八十七隻油九斤一兩盞一百七十四隻油八斤二兩半術曰依左行互乘右行左上倍之得圓步算一十八左下得二十併之得三十八為法左行相乘得十二為乘法列共油通兩內子得二百七十五兩半以十
  hash: sha256:f708892d016b3dde49fc37fdfd901b5af9b1786a0deb06568cbd4f230fc1d699
