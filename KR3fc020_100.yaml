body:
  text: 法通之內子得二千三十一尺以乘上位得六百三十七萬九千三百七十一為實又列七匹通尺內子得一百七十四尺五寸為法除之得三萬六千五百五十八銖以斤銖法三百八十四約之為斤不滿法者以兩銖法二十四約之為兩不滿法者命之合問今有絲八斤二兩二十一銖織錦七匹六尺五寸只有絲九十五斤三兩六銖問織錦幾何匹法同前答曰八十四匹一丈五尺術曰列只有絲通兩內子得一千五百二十三兩以而十四銖通之內子六共得三萬六千五百五十八銖於上位有列七匹通尺內子得一百七十四尺五寸以乘上位得六百三十七萬九千三百七十一為實又列八斤通兩內子得一百三十兩以二十四銖通之內子二十一共得三千一百四十一為法實如法而一得二千三十一尺以匹法約之合問
