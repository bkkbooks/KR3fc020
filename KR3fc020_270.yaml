body:
  text: 術曰列全步通分內子得四千五百八十八萬二千七百一十二為實以一為隅立方開之得三百五十八乃每面方積分又列分毋為實一為隅立方開之得七報除不滿法者命分合問今有積一百一十二萬九千四百五十八尺六百二十五分尺之五百一十一問為三乘方幾何答曰三十二尺五分尺之三術曰列全步通分內子得七億五百九十一萬一千七百六十一為實以一為隅三乘方開之得一百六十三乃每面方積分又列分毋為實以一為隅開三乘方而一得五報除合問今有積五百八十八步問為圓田徑幾何答曰二十八步術曰列積四之三而一得七百八十四為實以一為廉平方開之得圓徑合問今有積四百六十八步強半步問為圓周幾何答曰七十五步
