body:
  text: 為法除之下有所得加表高五字今朝鮮重刊本無此句而于案內云必須更加表高方準此又彼中鈔本奪落之故其後題則楊本九章以表望山術而變通諸數也外此凡字誤數誤洎夫圖與式諸誤悉各鑯出別記于後間有術義隱晦莫揭其恉亦各疏詮并附後次祖序玉鑑謂朱氏復遊廣陵踵門而學者雲集夫既曰雲集當不止一二人曾幾何時而學者姓氏莫知誰何一無可考茲吾鄉從事朱氏學者又復雲集愳後之無可考亦如今用是臚列其究心遊藝同治四元則有江都沈與九齡田季華普實天長岑紹周建功暨其從子秋舲淦全茮金禺谷望欣天長乃唐割江都六合高郵地所置初為千秋縣尋改今名本吾郡屬邑全茮則在隋即屬江都郡當朱氏遊廣陵其時二邑尚同隸揚州路故岑與金均得稱吾郡人其督工校讐則有儀徵陳朴生輅畢蘊齋光琦而此書之得以復歸吾郡者為甘泉汪孟慈喜孫倡其始皆有功于朱氏者焉校㪤因書此于簡末以見是書之可寶兼知源流云道光已亥七月既望惟揚後學羅士琳茗香識
