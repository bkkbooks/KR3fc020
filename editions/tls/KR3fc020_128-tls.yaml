body:
  text: 松庭朱世傑編撰田畒形段門十六問今有方田一段自方九十六歩問爲田幾何答曰三十八畒四分術曰列九十六歩自乘得九千二百一十六歩爲田積也以畒法二百四十歩除之合問今有直田一段長四十九歩闊二十四歩問爲田幾何答曰四畒九分術曰列長四十九歩以闊二十四歩乘之得一千一百七十六歩爲田積也以畒法二百四十歩除之合問今有勾股田一段勾三十六歩卽闊股六十二歩卽長問爲田幾何答曰四畒六分五厘術曰列股六十二歩以勾三十六歩乘之折半得一千一百一十六歩爲田積也以畒法而一合問
