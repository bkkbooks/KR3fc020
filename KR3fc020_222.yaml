body:
  text: 今有甲米六分㪷之五乙米五分㪷之四丙米四分㪷之三問減多益小各幾何而平答曰各平一百八十分之一百四十三術曰依毋互乘子右上得一百右圖布筭中得九十六右下得九十各爲列實副併得二百八十六爲平實左行分毋相乘得一百二十爲法又三之得三百六十亦三因右行未併者平實法實各半之得數減右上七減右中一而益右下得各平也合問今有六人五分人之四分銀八兩七分兩之三六分兩之五問人得幾何答曰一兩一千四百二十八分兩之五百一十七術曰依毋互乘子併之得五十三寄圖布筭位左行相乘得四十二以乘銀八兩得三百三十六併入寄位共得三百八十九以人分毋五因之得一千九百四十五爲實又列六人通分內子得三十四以銀分毋四十二乘之得一千四百二
  hash: sha256:917b8b986798dcbcf7e07224bd87b96508d2a1bf3010412d3e86724eab140a85
