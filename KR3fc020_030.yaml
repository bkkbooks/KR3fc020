body:
  text: 左上倍左中三因左下案三左字據術皆當為右字田畝形段弟十四問梭田形圖案圖內中濶線據形當為從線原圖誤作橫線之分齊同弟一問小字雙行注乃開算之戶用也案用訛當從片作用之分齊同弟五問減多益小案前注云益少據此小當作少開方釋鎖弟八問開方式案上層實二千五十二當為負誤作正開方釋鎖弟十問開方式案上層實一千一百七十六當為負誤作正開方釋鎖弟十一問別列和以減云數案云數非本數據術以減當作內減開方釋鎖弟十四問
