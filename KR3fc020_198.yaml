body:
  text: 答曰四萬一千四百六十一尺少半尺術曰上方自乘下方亦自乘又上下方相乘三位併之共得二千七百四尺又以高四丈六尺乘之得一十二萬四千三百八十四尺以三而一不滿法者命之合問今有圓亭臺一所下周四丈二尺上周二丈九尺高三丈八尺問積幾何答曰四千三十五尺一十八分尺之七術曰下周自乘上周自乘又上下周相乘三位併之共得三千八百二十三尺以高三丈八尺乘之得一十四萬五千二百七十四尺以三十六而一不滿法者各半之合問今有方錐下方二丈五尺高二丈八尺問積尺幾何答曰五千八百三十三尺少半尺術曰列下方二丈五尺自乘得六百二十五尺又以高二丈八尺乘之得一萬七千五百尺以三而一不滿法者命之合問今有圓錐下周五丈四尺高三丈七尺問為古
