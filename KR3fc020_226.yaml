body:
  text: 十七萬三千二百以分毋一百四十九約之合問堆積還源門十四問今有茭草底子每面五十四束問積幾何答曰一千四百八十五束術曰副置五十四束下位添一束以乘上位得二千九百七十半之得積合問今有圓箭一束外周五十四隻問積幾何答曰二百七十一隻術曰副置五十四隻上位添六隻以下位乘之得三千二百四十爲實以圓法十二而一加心箭一隻合問今有方箭一束外周四十四隻問積幾何答曰一百四十四隻術曰副置四十四隻各添四隻相乘得二千三百四爲實以一十六爲法而一合問今有三角垛果子每面底子四十四箇問共積幾何答曰一萬五千一百八十箇術曰列底子添三以底子乘之得數又添
