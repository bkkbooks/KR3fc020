body:
  text: 左上倍左中三因左下案三左字據術皆當爲右字田畮形段弟十四問梭田形圖案圖內中濶線據形當爲從線原圖誤作横線之分齊同弟一問小字雙行注乃開筭之戶用也案用譌當从片作用之分齊同弟五問減多益小案前注云益少據此小當作少開方釋鎖弟八問開方式案上層實二千五十二當爲負誤作正開方釋鎖弟十問開方式案上層實一千一百七十六當爲負誤作正開方釋鎖弟十一問別列和以減云數案云數非本數據術以減當作內減開方釋鎖弟十四問
