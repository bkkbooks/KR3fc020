body:
  text: 價一文問二色各幾何答曰檀香七十五兩兩價二文乳香六十五兩兩價三文術曰列錢數爲實以一百四十兩爲法實如法而一得二文乃檀香兩價加一文卽乳香兩價餘實六十五爲乳香數也反減下法餘七十五卽檀香數也合問按此其率者以錢爲實物爲法實如法而一所得爲賤率價加一文卽貴率價餘實則貴物數反減下法餘法爲賤物數也其積銖當以石鈞秤斤兩銖法約之其反率者以物爲實錢爲法實如法而一所得爲貴物加一卽賤物不滿法者餘實則化爲錢乃賤價也反減下法餘法爲貴價餘實餘法相併得共錢也今有錢八百四十文買核桃七千二百九十枚欲其貴賤率之問各幾何答曰其二千一百六十枚八枚直錢一文其五千一百三十枚九枚直錢一文術曰列核桃爲實以錢八百四十爲法實如法而一得八枚直錢一文就加一枚乃九枚直錢一文餘實五百七十反減下法
