body:
  text: 答曰七萬八千一百二十五碩術曰列芝麻數為實以五升一合二勺為法除之合問今有錢五百貫欲糴小麥每斛價錢一貫二百八十文問糴麥幾何答曰三百九十斛六斗二升半術曰列錢數為實以一貫二百八十文為法實如法而一合問今有人叄六萬斤每三十一斤四兩換茶一引問換茶幾何答曰一千九百二十引術曰列人叄數為實以三十一斤二分半為法實如法而一合問今有金七萬銖每三十五銖八絫四黍易片腦一片問易䐉幾何答曰一千九百五十三斤二兩術曰列金數為實以三十五銖八絫四黍為法實如法而一得一千九百五十三斤斤下一分二釐五毫以斤率十六乘之得二兩合問
  hash: sha256:bad01bf1e95011c56e07ad63c7e1ff589b2f6378fd19f0a28b996680b58b5e67
