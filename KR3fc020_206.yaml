body:
  text: 餘二百七十八之得貴物數其不盡五百七十九之得賤物數合問今有錢一十六貫五百文買漆一石三鈞一稱四斤五兩六銖欲其貴賤石率之問各幾何答曰其一石三鈞四兩一十八銖石價八千六百三十四文其一稱四斤一十二銖石價八千六百三十三文術曰列漆通銖得八萬八千六十二為法列錢以四萬六千八十乘之得七億六千三十二萬為實實如法而一得八千六百三十二文為賤石價加一文即貴石價不盡八萬七百五十四反減下法餘七千三百八以稱斤銖法除之得一稱四斤一十二銖為賤數其不盡八萬七百五十四以石鈞兩銖法除之得貴數合問今有錢二十五貫三百文買絲二石二鈞一稱三斤四兩八銖欲其貴賤鈞率
  hash: sha256:356c0ad365704d5ab84b8331ebe696a6610fe392898171f3767416291cc5e2b0
