body:
  text: 八尺七寸半竹長一丈四尺乃竹却過松五尺二寸半故曰有餘合問今有鵝鴨九十九隻直錢九百三文只云鵝九隻直錢一百二十三文鴨六隻直錢四十六文問二色及各價幾何答曰鵝二十四隻直錢三百二十八文鴨七十五隻直錢五百七十五文術曰假令鵝二十七隻鴨七十二隻有餘錢一十八文若令鵝二十一隻鴨七十八隻不足錢一十八文乃以盈不足術求之依圖維乘左上得四百八十六右布算上得三百七十八併之得八百六十四左中得一千二百九十六右中得一千四百四併之得二千七百各自為實併盈不足得三十六為法而一上為鵝數中為鴨數按此鵝二十七隻直錢三百六十九文鴨七十二隻直錢五百五十二文併之共得九百二十一文課於九百三文外多一十八文故曰有餘若令鵝二十一隻直錢二百八十七文鴨七十八隻直錢五百九十八文併之共得八百八十五文課於九百三文外少一十八文故曰不足合問
