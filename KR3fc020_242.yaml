body:
  text: 甲米一碩八斗五升乙粟二碩六斗五升術曰假令甲米二碩一斗有餘一斗令之一碩五斗不足一斗四升盈不足術求之依圖維乘上二位相併得四碩四斗布算四升為實以盈不足相併得二斗四升為法實如法而一得甲米反減四碩五斗餘即乙粟按此甲米二碩一斗乙粟二碩四斗以六因之得米一碩四斗四升併之得三碩五斗四升課於三碩四斗四升外多一斗故曰有餘若令甲米一碩五斗乙粟三碩以六因之得米一碩八斗併之得三碩三斗課於三碩四斗四升外少一斗四升故曰不足合問今有人携酒遊春不知其數只云遇務而添酒一倍逢花而飲三斗四升今遇務逢花俱各四次酒盡壺空問元携酒幾何答曰三斗一升八合七勺半術曰假令元酒三斗二升有餘二升令之元酒三斗不足三斗乃以盈不足術求之依圖維乘上二位相併得一碩二升布算為實以盈不足相併得三斗二
