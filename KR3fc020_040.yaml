body:
  text: 位乃以分母一千一百四十四通多于一平得一千一百四十四平以減上位餘一百九長內減一百二十二平開方釋鎖弟十六術夾注別得八長內減八平餘八較案此與弟十五術同以上文夾注長七十二箇平二十四箇和四十八箇即四十八平四十八長也較六十四箇即六十四長內減六十四平也四數相并得八平一百八十四長之共數于上位乃以分母九十六通不及二長得一百九十二長以上位減之餘八長內減八平亦即謂之八較惟揚後學羅士琳茗香氏斠詮
