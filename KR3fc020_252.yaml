body:
  text: 約之得牛價右行錢內減一牛價餘半之即馬價合問今有四兔三雞價過一千多半兔之價三兔四雞價不滿一千少半雞之價問雞兔各一直錢幾何答曰兔二百二十二文二十七分支之六雞七十四文二十七分文之二術曰依乃七兔六雞直錢二千六兔九雞亦直錢二千先圖布算以左行直減右行訖却以左上六遍因右行仍以左行同減異加右行右下錢位空正無人負之右上兔空餘雞二十七錢二千上法下實而一得雞價就通分內子得二千以乘左行雞九得一萬八千寄位又分母二十七通左行錢得五萬四千內減寄位餘三萬六千以六而一得六千以分母二十七約之得兔價合問今有五雞四兔共重十斤半兔重雞輕交換其一稱之重適等問雞兔各一重幾何
