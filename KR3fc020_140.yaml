body:
  text: 四爲田積也以畒法除之合問宻率曰內外周相減餘半之得四十五歩七之得三百一十五以二十二而一得一十四歩二十二分歩之七爲宻徑也通分內子得三百一十五於上位亦併內外周而半之得九十九以乘上位得三萬一千一百八十五以二十二而一得一千四百一十七歩二十二分歩之一十一爲田積也以畒法除之合問倉囤積粟門九問今有倉一所長三丈八尺濶一丈二尺五寸湥一丈六尺四寸問粟幾何答曰三千一百一十六斛術曰列長三丈八尺以濶乘之得四百七十五又以湥乘之得七千七百九十爲積尺也以斛法二尺五寸約之此依唐時斛法以今斛考之有異緣各朝代尺法不同不可爲定法也合問今有平地聚粟下周三丈六尺高八尺六寸問粟幾何答曰一百二十三斛八㪷四升
  hash: sha256:954be4a05051eb59d805386b20b1409d5856ab9477654446f60ccd238822e6c0
