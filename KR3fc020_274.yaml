body:
  text: 十四歩問較歩幾何答曰十八歩術曰立天元一爲較加入云數爲二長又列云數內減一較餘爲二平式二長二平增乘起爲四段積寄左列畒通歩內子四之與寄左相消得開方式平方開之得較合問今有直田畒九分只云長平差二十五歩問長平各幾何答曰平二十四歩長四十九歩術曰立天元一爲平加入云數爲長以平乘起爲積寄左列畒通歩與寄左相消得開放式平方開之得平加差卽長合問今有直田六畒一十六歩只云長平較三十歩問長平和幾何答曰和八十二歩術曰李天元一爲和加入云數爲二
