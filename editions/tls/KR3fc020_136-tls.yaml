body:
  text: 今有三斜田一段大斜七十五歩中斜六十歩小斜四十五歩中股長三十六歩問爲田幾何答曰五畒六分二厘半術曰列大斜七十五歩以中股長三十六歩乘之得二千七百不折半得一千三百五十爲田積歩以畒法而一合問今有梭田一段中濶三十四歩長一百八十六歩問爲田幾何答曰一十三畒一分七厘半術曰列中濶折半得一十七歩以長一百八十六歩乘之得三千一百六十二爲田積歩以畒法而一合問今有方五斜七八角田一段只云每面濶二十八歩問爲田幾何答曰一十六畒術曰副置濶二十八歩上位六之爲長下位倍之爲廣乃長廣相乘得九千四百八歩乃是二箇四分半積以二箇四分半除之得三千八百四十爲田積歩以畒法二
