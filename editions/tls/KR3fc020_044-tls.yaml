body:
  text: 年朱與秦之逮見不逮見未可知攷硯堅序演段在至元壬午先已亥才十七年莫若序玉鑑謂朱氏周游湖海二十餘年似朱與李猶得相及又案楊輝字謙光錢塘人箸筭法六卷阮相國文選樓亦有鈔本一曰田畮比類椉除捷法上二曰田畮比類椉除捷法下三曰筭法通變本末四曰椉除通變筭寶五曰法筭取用本末六曰續古摘竒筭法其書淺陋不足觀金序謂舍易趨囏斯言韙矣楊自序德祐乙亥爲宋瀛國公元年亦卽元至元十二年在海鏡後演段前計先是書二十四年楊與李當爲同時朱與楊或亦可逮見綜覈諸家先後相距未踰六十年以時攷之彼時筭名最箸如李受益郭邢臺諸公亦適值其間所以秝法大明又如楊序所偁中山劉先生及史仲榮玉鑑祖序所偁平陽蔣周等雖其書不傳其人莫攷而其一時人才之盛聰明精銳已可槪見宜乎筭之超越今古也降及明季以空談爲便筭學寖失書亦湮亡致顧箬溪輩妄刪天元細艸遂成絕學今十經惟缀術失傳餘與秦李諸書次弟復出皆收入四庫全書而玉鑑亦經吾鄉阮相國續獲鈔錄斯
