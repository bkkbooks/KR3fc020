body:
  text: 七釐半為法實如法而一合問今有一萬尺每一尺二分四釐換麻一斤問換麻幾何答曰九千七百六十五斤十一兩術曰列數為實以一尺二分四釐為法實如法而一斤下分者身外加六為兩合前問今有錢二萬貫欲買細絲斤價四貫九十六文問得絲幾何答曰四千八百八十二斤一十三兩術曰列錢數為實以斤價四貫九十六文為法除之斤下分者身外加六為兩合問今有米三萬斗每八升一合九勺二抄折豆一斗問折豆幾何答曰三千六百六十二碩一斗九合三勺七抄五撮術曰列米數為實以八升一合九勺二抄為法實如法而一合問今有芝麻四萬碩每五升一合二勺對粟一斗問對粟幾何
  hash: sha256:855b634d22bcf8cdf98ae34978159b4af4ec7261ace6c119285372cd8a227b67
