body:
  text: 求一代椉除又有求一除等術是已穿韜者代椉代除也楊書各設三百題謂之穿除證以夏侯陽筭經亦有身外添幾減幾并同此法蓋今之飛歸實穿韜之一種互換之名并見楊書續古摘竒及秦書卷六錢榖章或名互換或名互易其中有所謂雁翅椉與是書盈不足術維椉大略相似維椉之名九章秦書互見大氐諸率皆濫觴于宋元以前然則古法之班班可攷尚賴是書復顯而爲之佐證焉特朝鮮依元大德時趙氏原槧本重雕其田畮形段弟十四問梭田形圖騎版心割去上方魚尾與玉鑑首列四元自椉演段及五和五較三圖同病蓋宋元時凡書之有圖者多爲蝴蝶裝如今之冊頁作兩翼相合對形故雖占中縫于圖無礙非若今時書線裝反折致一圖而分陰陽面各半然是書之所重不在圖㚲仍其舊惟朝鮮本之版扇視近刻玉鑑細艸本較廣今但尠爲縮狹影刊庶朱氏二書通爲一律至款式一依朝鮮原刻其當時俗寫字如那作那臺作㙜假或作假又厘畒之類不可枚舉亦不校改俾存原本之眞慎之至也至于是書田之并見玉鑑或疑字書所
