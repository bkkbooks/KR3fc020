body:
  text: 術曰列下周自乘得一千二百九十六尺以高乘之得一萬一千一百四十五尺六寸以三十六除之得三百九尺六寸為積也以斛法約之合問今有倉一所自方二丈四尺湥一丈問粟幾何答曰二千三百四斛術曰列方尺自乘得五百七十六尺又以湥乘之得五千七百六十尺為積也以斛法約之合問今有倚壁聚粟下周一丈八尺高八尺四寸問粟幾何答曰六十斛四斗八升術曰列下周自乘得三百二十四尺又以高乘之得二千七百二十一尺六寸以十八而一得一百五十一尺二寸為積也以斛法約之合問今有內角聚粟下周九尺六寸高六尺二寸問粟幾何答曰二十五斛三斗九升五合二勺術曰列下周自乘得九十二尺一寸六分
