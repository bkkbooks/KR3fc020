body:
  text: 算學啓蒙序嘗觀水一也散則千流萬泒木一也散則千條萬枝數一也散則千變萬化老子曰數者一也道之所生七於一數之所成成於九昔者黃帝氏定三數為十等九章之名立焉周公制禮作為九數九數之流九章是已夫算乃六藝之一周之賔賢能教國子此九數也歷代沿襲設科取士魏唐間算學尢專如劉徽之注九章續撰重羌淳風之解十經發明補問博綜精微一時獨步自時厥後科目既發算法罕傅信如是也則計租庸調何術可憑步數畸殘若為銷豁米榖正耗何由剖析是猶拾重句而欲測海去寸木而欲量天多見其不知量也燕山松庭朱君篤學九章旁通諸術於寥寥絶響之餘出意編撰算書三卷分二十門立二百五十九問細草備辭置圖折體訓為算學啓蒙其於會計租庸田疇經界盈朏隱互正負方程開方之類已足以貫通古今發明後學卷末一門立天元一算包羅策數靡有子遺明天地之變通演隂陽之消長能窮未明之明克盡不解之解索數隱微
  hash: sha256:7c6643e546abb87fcef22123b79f6d601d866057f20b9cbde62eb1871b629fbe
