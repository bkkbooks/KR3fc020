body:
  text: 術曰列全歩通分内子得四千五百八十八萬二千七百一十二爲實以一爲隅立方開之得三百五十八乃每面方積分又列分毋爲實一爲隅立方開之得七報除不满法者命分合問今有積一百一十二萬九千四百五十八尺六百二十五分尺之五百一十一問爲三乗方幾何答曰三十二尺五分尺之三術曰列全歩通分内子得七億五百九十一萬一千七百六十一爲實以一爲隅三乗方開之得一百六十三乃每面方積分又列分毋爲實以一爲隅開三乗方而一得五報除合問今有積五百八十八歩問爲圓田徑幾何答曰二十八步術曰列積四之三而一得七百八十四爲實以一爲廉平方開之得圓徑合問今有積四百六十八歩強半歩問爲圓周幾何答曰七十五歩
