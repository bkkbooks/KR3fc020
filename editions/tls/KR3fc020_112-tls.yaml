body:
  text: 術曰列欠錢數五之得五萬六千二百五十貫爲實以三十爲法實如法而一合問又術曰列欠錢數爲實以六除之卽得錢銀適等也而今有之中統至元是也今有人欠錢一千九百五十八貫欲還二分銀一分錢其銀每兩折錢五貫問各還幾何答曰錢一百七十八貫銀三百五十六貫術曰列欠錢數五之得九千七百九十貫爲實以五十五爲法實如法而一得錢數倍之爲銀數也合問又術列欠錢爲實身外減一得錢也倍之爲銀今有錢七十三貫五百八十四文欲買油麵粉三色適等油斤價三百四十八文麺斤價一百二十四文粉斤價一百一十二文問各等重幾何答曰各一百二十六斤
  hash: sha256:04ac5ad48f80fe501ee34535acff3d7f075416cd0d1f61a3e81667e1c8c9d96d
