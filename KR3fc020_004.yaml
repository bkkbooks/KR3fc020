body:
  text: 祖頤序四元玉鑑稱朱氏嘗游廣陵學者雲集編集算學啓蒙趙元鎮先後付梓謂二書相為表裏元昔撫浙時獲得玉鑑舊鈔本擬演細草未果甘泉羅君茗香得其寫本補全細草刊布而以未見啓蒙為憾近年羅君又從都中人于琉璃厰書肆中得朝鮮重刊本計三卷因思論語皇侃疏七經孟子考文傳自日本皆收録入四庫全書中國刊行已久今得此書亦可依例刊行案此書總二十門凡二百五十九問其名術義例洵多與玉鑑相表裏羅君為之互斠其證得七玉鑑首列和較羃積諸圖始于天元終于四元義主精邃所得甚深考大德癸卯莫若序計後此書四年此書首列乘除布算諸例始於超徑等接之術終于天元如積開方由淺近以至通變循序而進其理易見名曰啓蒙實則為玉鑑立術之根此一證也玉鑑原本十行行十九字今有氐一格術日又氐二格與此書同式此二證也玉鑑斗斛之斗別用㪷此假借字本漢書平帝紀及管子乘馬篇尚雜見于唐以前之孫子五曹張邱建諸算經其鈞石之石說文本作柘玉鑑作碩碩與石古雖
  hash: sha256:b8650930df2fbb2838743d9cc3995047352f7ae9bd9c9b1882b3c51b32261f9f
