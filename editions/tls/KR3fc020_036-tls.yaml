body:
  text: 米六升豆八升粟一㪷除之上得米一㪷中得豆七升五合下得粟六升并之得二㪷三升五谷折變互差弟十二術列粟數以五升一合二勺椉之爲實以二㪷二升八合爲法案此與弟八術同唯此則糙米二停故以上文椉率五升一合二勺爲分母通粟一㪷得粟五㪷一升二合副置上下二位上位倍之爲糙米二停各以糙米八升細米五升一合二勺除之上得糙米一㪷二升八合下得細米一㪷并之得二㪷二升八合中卷田畮形段弟十五術副置濶二十八歩上位六之爲長下位倍之爲廣乃長廣相椉得九千四百八歩乃是二箇四分半積以二箇四分半除之爲田積歩案濶卽斜也此形田中心積爲一段斜自椉羃并田四隅積亦一段斜自椉羃其田四邊積則爲四段斜椉方羃合而計之乃倍斜椉二方一斜之和羃故倍下位爲廣其長當爲二方一斜之和然方
