body:
  text: 以左行互乘右行右上得五百七十六右下得一千二百八十八二位相併得一千八百六十四爲法左行分毋相乘得齊四十二乃是馬軍四十二人得腿裙絹五百七十六尺歩軍四十二人得胖襖絹一千二百八十八尺列絹六千六百二十二匹以三十八乘之得數搭入四尺共得二十五萬一千六百四十尺以分毋四十二乘之得一千五十六萬八千八百八十爲實以一千八百六十四爲法實如法而一各得五千六百七十人合問今有粮一萬三千四百七十七碩一㪷三分㪷之一欲給軍人只云馬軍六人給粮五十三㪷水軍七人給粮五十四㪷歩軍九人給粮五十五㪷其馬軍如水軍中半歩軍多如馬軍太半問三色軍及格給粮幾何答曰馬軍三千一百六十四人粮二千七百九十四碩八㪷三分㪷之二
