body:
  text: 微徑五十六步術曰立天元一為古徑自之三因為四段古積就以七百乘之為二千八百段古積又列古徑加七步為密率徑自之又二十二乘之為二十八段密率就以一百乘為二千八百段密積也又列密徑加七步為微徑自之又以一百五十七乘之為二百段微術就以十四乘三位之亦為二千八百段徽積也併之寄位列積五千六百七十一步通分內子以五十六乘之與寄位相消得開平方開之得古徑加七方數式得密徑又加七得微徑也今有圓田一段周為實平方開之得數加入圓積共得一百一十四步問周徑各幾何答曰周三十六步徑一十二步
