body:
  text: 是書與四元玉鑑同為元大德時朱松庭先生所撰二書久佚玉鑑之名猶見於梅文穆公赤水遺珍中是玉鑑尚有流傳之本而是書竟絶無知者向為玉鑑補草時知是書與玉鑑相表裏深以未見為憾近聞朝鮮以是書為算科試士因郵凂都中士訪獲是書為朝鮮重刊本卷首有朝鮮通政大夫守全南道觀察使兼兵馬水師節度使巡察使全州府尹金始振序又元大德惟揚學算趙城元鎮原序各一首竊惟唐時選舉有明算科自周髀以迄王孝通之緝古號為十經分限年歲趙序淳風之解十經即此謂耳厥後科目雖廢去古未逺文獻可徵故言算要當以宋元時秦李朱三家為大備秦氏箸數學九章而古正負開方術顯李氏箸測圜海鏡益古演段二書而古立天元一術傳朱氏集秦李之大成而兼而有之又推廣以至四元于是實事求是無隱不見無微不彰矣案秦書自序淳祐七年是歲丁未為元定宗二年李氏二書海鏡在演段之先自序戊申當為元定宗三年計秦李兩家書先後厪差一年秦李同時不待言矣是書成于大德已亥上距淳祐丁未五十三
