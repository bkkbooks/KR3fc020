body:
  text: 答曰平五十六步長八十四步術曰依母互乘子得長七十二箇平二十四圖布算箇和四十八箇較六十四箇分母相乘得九十六以乘不及得二百二十四步别得八長內減八平餘八較今從省八約之得二十八步為一較即一長內減一平立天元一為平加入二十八步為長用平乘起為積寄左列畒以二百四十乘之與寄左數相消得開方式平方開之得平以平除積得長也今有圓田一段內有方池容邊而占之外餘地八畒六十五步七分半只云四弧矢各濶一十三步問圓徑池方各幾何答曰圓徑九十一步池方六十五步術曰立天元一為圓徑內減倍之云數餘為池方面自之就分四之為四
