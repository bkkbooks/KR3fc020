body:
  text: 余少也嘗留意算學而東國所傳不過詳明等書淺近之法如九章六觚微妙之術鮮有解者無可質問歲丁酉居憂抱病無外事適得抄本楊輝算書於今金溝縣令鄭君漾又得國初印本算學啓蒙於地部會士慶善徵較其同異究其源流則楊輝非但字多豕亥術亦舍易趨囏不便初學啓蒙簡而且備實是算家之總要第其末端二紙漫斃過半殆不可辨今大興縣監任君濬於術無所不通一見而解之手圖而補其缺其後偶得一抄本讎之果不差毫氂於是乎遂為成書而布之不廣慮益久而絶其傳更以楊輝望海島一章添入卷尾刊梓而壽之以遺後之游藝君子云順治十七年庚子七月下浣通政大夫守全南道觀察使兼兵馬水軍節度使巡查使全州府尹金始振識乙未校正
