body:
  text: 今有三斜田一段大斜七十五步中斜六十步小斜四十五步中股長三十六步問為田幾何答曰五畒六分二釐半術曰列大斜七十五步以中股長三十六步乘之得二千七百不折半得一千三百五十為田積步以畒法而一合問今有梭田一段中濶三十四步長一百八十六步問為田幾何答曰一十三畒一分七釐半術曰列中濶折半得一十七步以長一百八十六步乘之得三千一百六十二為田積步以畒法而一合問今有方五斜七八角田一段只云每面濶二十八步問為田幾何答曰一十六畒術曰副置濶二十八步上位六之為長下位倍之為廣乃長廣相乘得九千四百八步乃是二箇四分半積以二箇四分半除之得三千八百四十為田積步以畒法二
  hash: sha256:a080f43fe5ff75c8bb98a152c2eadc984929d93bb0901b4460d83fc2a4bfe3af
