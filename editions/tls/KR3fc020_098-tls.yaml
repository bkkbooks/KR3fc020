body:
  text: 絹闊二尺五寸問還幾何匹法三十二尺答曰一匹一尺一寸二分術曰列絹通尺內子得四十六尺以闊一尺八寸乘之爲實以二尺五寸爲法除之仍以匹法約之合問今有人借絹一匹一尺一寸二分闊二尺五寸今還絹闊一尺八寸問還長幾何匹法同前答曰一匹一丈四尺術曰列絹通尺內子得三十三尺一寸二分以二尺五寸乘字爲實以一尺八寸爲法實如法而一仍以匹法約之合問今有織錦七匹六尺五寸用絲八斤二兩二十一銖欲織八十四匹一丈五尺問用絲幾何匹法二十四尺答曰九十五斤三兩六銖術曰列八斤通兩內子二得一百三十兩以二十四銖通之內子二十一得三千一百四十一銖於上位又列八十四匹以匹
  hash: sha256:4ca6ca6e28e5e50a8b69143a501ae2ee5c16ae71902da8c96425872ee2060c7c
