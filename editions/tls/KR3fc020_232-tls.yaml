body:
  text: 術曰列積六之得九萬一千八十爲實以二爲從方三爲從廉一爲隅法開立方除之合問今有四角垛果子積二萬九千三百七十箇問底子一面幾何答曰四十四箇術曰列積三之得八萬八千一百一十爲實以半箇爲從方一箇半爲從廉一爲隅法開立方除之合問今有立圓積二千三百四寸問爲立圓徑幾何答曰一尺六寸術曰列積寸以十六乘之九而一得四千九十六寸爲實以一爲隅法開立方除之卽得合問今有三角四角果子各一所共積六百八十五箇只云三角底子一面不及四角底子一面七箇問二色底子一面各幾何答曰三角底面五箇
