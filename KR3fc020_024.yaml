body:
  text: 十厘謂之一分十分謂之一寸十寸謂之一尺十尺謂之一丈匹率或三丈二或二丈四端率或五丈五或四丈八田畒起率田起於忽闊一寸長六寸十忽謂之一絲十絲謂之一毫十毫謂之一厘十厘謂之一分十分謂之一畒百畒謂之一頃三百歩謂一里按畒法闊一歩長二百四十歩當自方五尺爲歩也其里法三百歩爲里者當自方六尺爲歩若三百六十歩爲里者當以自方五尺爲歩也古法圓率周三尺徑一尺劉徽新術劉徽乃魏人也立此新術以究圓之幽微周一百五十七尺徑五十尺冲之宻率冲之姓祖乃宋南徐州從事史立此宻率亦究圓之微也周二十二尺徑七尺明異名訣此乃刻漏之數以巧呼之二分之一爲中半三分之一爲少半三分之二爲太半四分之一爲弱半四分之三爲强半
  hash: sha256:e349e9efc58da5b75aa333156291804258ad8a58fad8ec7d2b6014be3b37b0e7
