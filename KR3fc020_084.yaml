body:
  text: 百八十文問得幾何答曰六十三斤四兩術曰列錢數為實以斤價三百八十文為法除之斤下分者身外加六為兩合問今有錢四十三貫八百七十五文欲買水銀斤價四貫五百文問買幾何答曰九斤一十二兩術曰列錢數為實以四貫五百文為法實如法而一斤下分者身外加六為兩合問今有錢二十貫一百九十六問欲買丁香兩價五十四文問得幾何答曰二十三斤六兩術曰列錢數為實以五十四文為法實如法而一得三百七十四兩以斤率十六約之合問今有錢五貫六百六十一問欲買陳皮斤價六十八文問得幾何答曰八十三斤四兩術曰列錢數為實以六十八文為法實如法而一斤下分者身外加六為兩合問
