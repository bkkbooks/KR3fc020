body:
  text: 術曰依以盈不足維乘之右上得八圖布算十四左上得二百四十併之得三百二十四為實盈不足相併得七十二為法列七兩四兩以少減多餘三兩約法實實為銀數法為人數合問今有人買羊不知其數只云人出四百盈一貫七百四十人出三百盈八百四十問羊價及人各幾何答曰羊價一貫八百六十文九人術曰依以兩應維乘所出率左丄得圖布算三百三十六貫右上得五百二十二貫以少減多餘一百八十六貫為實兩盈相減餘九百為法列四百三百相減餘一百約法實實為羊價法為人數合問問兩不足者同此術今有人買牛不知其數只云人出五百盈五千人出三百適足問牛價及人各幾何
