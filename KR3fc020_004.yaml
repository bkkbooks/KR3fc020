body:
  text: 祖颐序四元玉鑑偁朱氏嘗游廣陵学者雲集編集筭學啟蒙趙元鎮先後付梓謂二書相爲表裏元昔撫浙時獲得玉鑑舊鈔本儗演細艸未果甘泉羅君茗香得其寫本補全細艸刊布而以未見啟蒙爲憾近年羅君又從都中人于琉璃厰書肆中得朝鮮重刊本計三卷因思論語皇侃疏七經孟子攷文傳自日本皆收録入四庫全書中國刊行已久今得此書亦可依例刊行案此書總二十門凡二百五十九問其名術義例洵多與玉鑑相表裏羅君爲之互斠其證得七玉鑑首列和較羃積諸圖始于天元終于四元義主精邃所得甚深攷大德癸卯莫若序計後此書四年此書首列椉除布筭諸例始於超徑等接之術終于天元如積開方由淺近以至通變循序而進其理易見名曰啟蒙實則爲玉鑑立術之根此一證也玉鑑原本十行行十九字今有氐一格術日又氐二格與此書同式此二證也玉鑑斗斛之斗別用㪷此假借字本漢書平帝紀及管子椉馬篇尚雜見于唐以前之孫子五曹張邱建諸筭經其鈞石之石説文本作柘玉鑑作碩碩與石古雖
