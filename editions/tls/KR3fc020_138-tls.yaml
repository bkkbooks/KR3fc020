body:
  text: 百四十歩除之合問今有環田一段外周一百四十四歩內周五十四歩實徑一十五歩問爲古徽宻率田各幾何答曰古法六畒一分八厘七毫半徽術五畒九分二歩一百五十七分歩之一百二十四宻率五畒九分一歩二十二分歩之十一古法曰併內外周折半得九十九歩以實徑一十五歩乘之得一千四百八十五爲田積歩以畒法除之合問徽術曰內外周相減餘半之得四十五歩又五十乘之以一百五十七而一得一十四步一百五十七分步之五十二爲徽徑也通分內子得二千二百五十於上位併內外周而半之得九十九以乘上位得二十二萬二千七百五十以分毋一百五十七而一得一千四百一十八歩一百五十七分歩之一百二十
  hash: sha256:b94fd59b33a0063bf149acc5829aa79e36ff307e6cc6840c7ad8ffec9bbe9e09
