body:
  text: 數遆減逐節差卽得合問差分均配門十問今有甲乙丙共分息錢四十五貫三十六文甲元錢五十八貫乙元錢四十五貫丙元錢三十六貫問各分息錢幾何答曰甲一十八貫七百九十二文乙一十四貫五百八十文丙一十一貫六百六十四文術曰列甲元錢五十八貫以息錢四十五貫三十六文乘之得二千六百一十二貫八十八文又列乙元錢四十五貫以四十五貫三十六文乘之得二千二十六貫六百二十文又列丙元錢三十六貫亦以四十五貫三十六文乘之得一千六百二十一貫二百九十六文各爲列實併各人元錢共得一百三十九貫爲法實如法而一各得分錢之數合問今有甲乙丙出絲織羅五十四匹二丈四尺甲
  hash: sha256:494df6f8a3e695374de5fb753d31add2778f1c2b1d0a19a339f43f8e0f4e1347
