body:
  text: 五文問得得米幾何答曰三百六十九㪷術曰列只有錢數以五十三㪷四升乘之爲實以九貫八百七十九文爲法實如法而一合問今有銀二十二兩五錢二分半倒絲六斤一十兩只有絲三百四斤一十二兩問倒銀幾何答曰一千三十六兩一錢半術曰列只有絲數斤下留兩以二十二兩五錢二分半乘之爲實以六斤六分二厘半爲法實如法而一六分二厘半者乃十留六二五合問今有絲六斤一十兩直銀二十二兩五錢二分半只有銀一千三十六兩一錢半問得絲幾何答曰三百四斤一十二兩術曰列只有錢數以六斤六分二厘半乘之爲實以二十二兩五錢二分半爲法除之斤下分者身外加六爲兩合問今有人借絹一匹一丈四尺闊一尺八寸今還
