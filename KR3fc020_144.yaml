body:
  text: 又以高乘之得五百七十一尺三寸九分二釐以九而一得六十三尺四寸八分八釐為積也以斛法約之合問今有圓囤一所周一丈九尺高八尺七寸問粟幾何答曰一百四斛六斗九升術曰列周自乘得三百六十一尺又以高乘之得三千一百四十尺七寸以圓法十二而一得二百六十一尺七寸二分半為積也以斛法約之合問今有方倉一所上方四尺下方六尺高一丈二尺問粟幾何答曰一百二十一碩六斗術曰上方自乘下方亦自乘又上下方相乘三位併之得七十六尺以高乘之得九百一十二尺三而一得三百四尺為積也以斛法約之合問今有圓囤一所上周三丈六尺下周七丈二尺高二丈問粟幾何答曰二千一十六斛
