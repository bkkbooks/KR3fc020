body:
  text: 木幾何答曰三千二百六十株術曰列錢物於上為實各以價錢為法從上身外減之即得合問此術即是求一除法九歸除法門二十九問實少法多從法歸實多滿法進前居常存除數專心記法實相停九十餘但遇無除還頭位然將釋九數呼除流傳故泄真消息求一穿韜總不如今有錢四貫三百二十文欲糴白豆每㪷價錢二十文問得幾何答曰二百一十六㪷今有錢四十三貫二百文欲買細絲每斤價錢三百文問得幾何答曰一百四十四斤今有錢一千四百一十六貫欲買絹子每匹價錢四貫文問得幾何答曰三百五十四匹今有錢二萬七千三百五十兩欲為課銀每鋌五十兩問為幾鋌
