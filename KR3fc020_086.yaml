body:
  text: 今有銀一十五兩一錢六分三厘二毫每銀七厘二毫換片腦一銖問得幾何答曰五斤七兩一十八銖術曰列銀數爲實以七厘二毫爲法除之得二千一百六銖以斤銖法三百八十四約之得五斤不滿法者以兩銖法二十四約之得七兩不滿法者命之合問今有錢五百九十一貫九百四十八文欲買銀朱兩價八十七文問得幾褁答曰一百八十九褁術曰列錢數爲實以八十七文爲法實如法而一得六千八百四兩以褁法三十六約之合問今有細米七㪷九升五谷三勺四抄每九升一合準糲米以㪷問得幾何答曰八㪷七升四合術曰列米數爲實以九升一合爲法實如法而一合問今有香油二百五十六斤半每三斤一十二兩用芝麻一㪷問用芝麻幾何
  hash: sha256:2d7ca6fbce77e331acee124da300474e485397f2c056fc3881927a8f664cdf28
