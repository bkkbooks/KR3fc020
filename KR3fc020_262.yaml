body:
  text: 答曰句二十七步股三十六步弦四十五步術曰前分毋十八乘五步得九百七十二乃是九箇句弦和四箇股弦和又後分毋乘餘數得七百五十六是三句弦和減十二股弦和數如方程正負入之依圖以右行三次異減同加左行布算左中得股弦和四十箇左下得三千二百四十步上法下實而一得股弦和八十一步就以十二乘之得數以減右下七百五十六餘二百一十六以三約之得句弦和七十二步也以股弦和乘而倍之得一萬一千六百六十四為實乃弦和和羃也以一為廉平方開之得一百八即弦和和副置上位減股弦和即句下位減句弦和即股又句弦和內減句餘即弦合同今有直田句弦和取七分之四股弦和取七分之六二數相減餘二十二步又股弦取三分之一不及句弦
  hash: sha256:e8c2c8d5085c62eb0c107db0c76c614bb15722696de3049dba5d2c2e73ff1f4c
