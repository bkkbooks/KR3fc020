body:
  text: 今欲築圓城一座內周二十六里二百一十九步厚三步半除水門四處各濶四步旱門四處各濶二步四尺只云從城外邊每二步二尺安乳頭三枚問共安乳頭幾何里步尺率各依古法答曰一萬三百二枚七分枚之六術曰列內周通里內子得八千一十九步於上位倍厚步三之加上位以六尺因之得四萬八千二百四十尺乃城外周之數寄位列水門濶四步六之又四之得九十六尺以減寄位又列旱門濶二步以六因之內子四又四之得六十四尺又減寄位餘四萬八千八十尺乃城外周合安乳頭之數三之得一十四萬四千二百四十為實又列二步六之內子二得一十四尺為法實如法而一不滿法者各半之合問貴賤反率門八問今有錢三百四十五文共買檀乳香一百四十兩只云乳香兩價貴如檀香兩
