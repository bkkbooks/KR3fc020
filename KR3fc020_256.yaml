body:
  text: 丙五十二斤術曰以左行直減右行餘甲正依圖一乙正二丙負三絲正一布算十六又以左上三遍乘中右二行仍以左行減之中上甲空乙正十一丙正五絲正二百五十二右上甲空乙正五丙負十三絲負八十四又以中行乙十一遍乘右行仍以中行五次同減異加甲乙空餘丙一百六十八絲二千一百八十四上法下實而一得一十三斤乃一分之率也四之即丙絲以十三乘中行丙五以減中行絲餘者十一除之四因得乙絲又十三乘左行丙四以減左行絲又減乙一十七斤餘以三約之四因即甲絲合問今有紅錦四尺青錦五尺黃錦六尺價皆過三百文只云紅錦四尺價過青錦一尺青錦五尺價過黃錦一尺黃錦六尺價過紅錦一尺問三色各一尺錢幾何答曰
