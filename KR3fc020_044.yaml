body:
  text: 年朱與秦之逮見不逮見未可知考硯堅序演段在至元壬午先已亥才十七年莫若序玉鑑謂朱氏周遊湖海二十餘年似朱與李猶得相及又案楊輝字謙光錢塘人箸算法六卷阮相國文選樓亦有鈔本一曰田畝比類乘除捷法上二曰田畝比類乘除捷法下三曰算法通變本末四曰乘除通變算寶五曰法算取用本末六曰續古摘竒算法其書淺陋不足觀金序謂舍易趨囏斯言韙矣楊自序德祐乙亥為宋瀛國公元年亦即元至元十二年在海鏡後演段前計先是書二十四年楊與李當為同時朱與楊或亦可逮見綜核諸家先後相距未踰六十年以時考之彼時算名最箸如李受益郭邢臺諸公亦適值其間所以秝法大明又如楊序所稱中山劉先生及史仲榮玉鑑祖序所稱平陽蔣周等雖其書不傳其人莫考而其一時人才之盛聰明精鋭已可概見宜乎算之超越今古也降及明季以空談為便算學寖失書亦湮亡致顧箬溪輩妄刪天元細草遂成絶學今十經惟綴術失傳餘與秦李諸書次弟復出皆收入四庫全書而玉鑑亦經吾鄉阮相國續獲鈔録斯
