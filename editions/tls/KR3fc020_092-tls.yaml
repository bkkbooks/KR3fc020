body:
  text: 答曰七萬八千一百二十五碩術曰列芝麻數爲實以五升一合二勺爲法除之合問今有錢五百貫欲糴小麥每斛價錢一貫二百八十文問糴麥幾何答曰三百九十斛六㪷二升半術曰列錢數爲實以一貫二百八十文爲法實如法而一合問今有人叄六萬斤每三十一斤四兩換茶一引問換茶幾何答曰一千九百二十引術曰列人叄數爲實以三十一斤二分半爲法實如法而一合問今有金七萬銖每三十五銖八絫四黍易片腦一片問易䐉幾何答曰一千九百五十三斤二兩術曰列金數爲實以三十五銖八絫四黍爲法實如法而一得一千九百五十三斤斤下一分二厘五毫以斤率十六乘之得二兩合問
