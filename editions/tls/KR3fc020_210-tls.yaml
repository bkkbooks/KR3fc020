body:
  text: 其二石二鈞八斤一十兩秤價四百五十七文其二十四石三鈞一十斤二兩一十八銖秤價四百五十六文術曰列椒通銖得一百二十六萬二千八百九十八爲法列錢以五千七百六十乘之得五億七千六百爲實實如法而一得四百五十六文爲賤秤價內加一文卽貴秤價不盡一十一萬八千五百一十二反減下法餘一百一十四萬四千三百八十六以石鈞斤兩銖法除之得二十四石三鈞一十斤二兩一十八銖爲賤數其不盡一十一萬八千五百一十二以石鈞斤兩銖法除之得二石二鈞八斤一十兩卽貴數合問今有錢二百五十貫買桂花一十二石三鈞一秤一十三斤九兩四銖欲其貴賤斤率之問各幾何答曰其五石一秤一十三斤五兩八
