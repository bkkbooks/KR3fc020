body:
  text: 今有鹽八百七十三袋每袋價錢一十三貫文問計錢幾何答曰一萬一千三百四十九貫今有地三頃二十四畒每畒納粮一升四合問計粮幾何答曰四碩五㪷三升六合今有木香一百九十八秤每秤重一十五斤問爲斤幾何答曰二千九百七十斤今有黃蠟三千八百五十斤每斤重一十六兩問爲兩幾何答曰六萬一千六百兩今有柑子四百三十六枚每枚價錢一十七文問計錢幾何答曰七貫四百一十二文今有軍人三千二百七十名每名支粮一碩八㪷問計粮幾何答曰五千八百八十六碩今有雞三百四十五隻每隻價錢一百九十文問計錢幾何
