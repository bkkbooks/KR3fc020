body:
  text: 十三分二釐乙得九百九十二分四釐丙得三百三十分八釐各為列實併各人分率得八為法各實如法而一得合問今有甲乙丙共分錢七十一貫九百文只云乙如甲五分之三却多如丙錢一貫八百文問各得錢幾何答曰甲三十三貫五百文乙二十貫一百文丙一十八貫三百文術曰列共分錢內虛加一貫八百得七十三貫七百為實併各人分率得一十一為法而一得六貫七百為一分之率副置上位五之得甲錢下位三之得乙錢乙錢內減一貫八百餘即丙錢合問今有甲乙丙相合查鹽甲三千六百五十引乙二千一百五十引丙一千九百五十引今鹽不敷止查得四千六百五十引問各人分鹽幾何答曰
  hash: sha256:8db31e3f8753b2916b2b2b2ddd4940dd5d4b7dbd45c1326dc32aee37ab821938
