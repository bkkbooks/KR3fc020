body:
  text: 二乘之得三千三百六爲實實如法而一得甌數倍之爲盞數也求油者以異乘同除求之合問今有竹七節下二節容米三升上三節容米二升問中二節及逐節各容幾何答曰下初一升二十七分升之十六次一升二十七分升之十一次一升二十七分升之六次一升二十七分升之一次二十七分升之二十三次二十七分升之十八次二十七分升之十三術曰依左行互乘右行得數以少減圓布筭多餘五爲差實乃逐節差數也分母相乘得六爲乘法又併三節二節半之得二節半以減七節餘四節半以分母六乘之得二十七爲法乃一升之分母實如法而一得一升卽衰相去也列二十七以三升乘之得八十一加差五得八十六半之得一升二十七分升之十六乃是下初節所容之
