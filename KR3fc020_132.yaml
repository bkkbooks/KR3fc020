body:
  text: 答曰八分術曰列徑一十六步自乘得二百五十六三之四而一得一百九十二為田積步以畒法除之合問今有圓田一段不記徑步只云周五十四步問為田幾何答曰一畒一釐二毫半術曰列周五十四步自乘得二千九百一十六以十二而一得二百四十三步為田積也以畒法而一合問今有晥田一段下周六十四步徑三十三步問為田幾何答曰二畒二分術曰列周六十四步以徑三十三步乘之得二千一百一十二以四而一得五百二十八為田積步以畒法二百四十步除之晥田宗田同圓田法一也合問今有弧田一段矢闊一十四步弦長二十八步問為田幾何答曰一畒二分二釐半
  hash: sha256:f0153d599c7dcbf9cbf550bc3cb56463019cd26772d01292c88a7bb0d238504d
