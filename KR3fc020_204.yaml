body:
  text: 價一文問二色各幾何答曰檀香七十五兩兩價二文乳香六十五兩兩價三文術曰列錢數為實以一百四十兩為法實如法而一得二文乃檀香兩價加一文即乳香兩價餘實六十五為乳香數也反減下法餘七十五即檀香數也合問按此其率者以錢為實物為法實如法而一所得為賤率價加一文即貴率價餘實則貴物數反減下法餘法為賤物數也其積銖當以石鈞稱斤兩銖法約之其反率者以物為實錢為法實如法而一所得為貴物加一即賤物不滿法者餘實則化為錢乃賤價也反減下法餘法為貴價餘實餘法相併得共錢也今有錢八百四十文買核桃七千二百九十枚欲其貴賤率之問各幾何答曰其二千一百六十枚八枚直錢一文其五千一百三十枚九枚直錢一文術曰列核桃為實以錢八百四十為法實如法而一得八枚直錢一文就加一枚乃九枚直錢一文餘實五百七十反減下法
