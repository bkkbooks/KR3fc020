body:
  text: 水軍六千三百二十八人粮四千八百八十一碩六㪷歩軍九千四百九十二人粮五千八百碩六㪷三分㪷之二術曰列六人七人九人於左行五十三㪷五十四㪷五十五㪷於右行左行互乘右行訖左上得三千三百三十九倍左中得五千八百三十二三因左下得六千九百三十共併又三因之得四萬八千三百三爲法左行相乘得三百七十八列共粮通分內子以三百七十八乘之得一億五千二百八十三萬六百九十二爲實以四萬八千三百三爲法實如法而一得馬軍倍之爲水軍三之卽歩軍也求各粮者列三色軍數各以本色給粮乘之爲實以各軍率除之合問新編筭學啓蒙卷上
  hash: sha256:b72f6da05ea7e5d80ba028b55331a7da25626b5b5f90c1da28e3c8752802cdc2
