body:
  text: 八貫三百問馬價及人各幾何答曰馬價五十三貫七百文人六十三術曰依以人數維乘所出率左上圖布筭得四萬九千右上得七萬二千副置相減得二萬三千爲約法又以盈不足維乘之左上得八億九千六百七十萬右上得三億三千八百四十萬併之得一十二億三千五百一十萬爲實人數互乘各得六十三亦以盈不足維乘之左中得一百一十五萬二千九百右中得二十九萬六千一百併之得一百四十四萬九千爲法各以二萬三千約之實爲馬價法爲人數合問今有甲米不知其數貯於四碩五㪷囤中乙悞入粟滿而相和今變爲糲米共量得三碩四㪷四升問甲米乙粟各幾何糲米六升折粟一斗答曰
  hash: sha256:ae2b9316ddbee7a8425fb9e71b4b9674a5f22bcbfd6d5042a5bd3c6b47cedda9
