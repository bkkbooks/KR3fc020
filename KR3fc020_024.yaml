body:
  text: 十釐謂之一分十分謂之一寸十寸謂之一尺十尺謂之一丈匹率或三丈二或二丈四端率或五丈五或四丈八田畒起率田起於忽闊一寸長六寸十忽謂之一絲十絲謂之一毫十毫謂之一釐十釐謂之一分十分謂之一畒百畒謂之一頃三百步謂一里按畒法闊一步長二百四十步當自方五尺為步也其里法三百步為里者當自方六尺為步若三百六十步為里者當以自方五尺為步也古法圓率周三尺徑一尺劉徽新術劉徽乃魏人也立此新術以究圓之幽微周一百五十七尺徑五十尺沖之密率沖之姓祖乃宋南徐州從事史立此密率亦究圓之微也周二十二尺徑七尺明異名訣此乃刻漏之數以巧呼之二分之一為中半三分之一為少半三分之二為太半四分之一為弱半四分之三為強半
  hash: sha256:bd2a39888d10cefc31af1b67a9660b7e74c3334fad47380c43e051635b58734b
