body:
  text: 答曰二兩一百六十八分兩之九十五術曰依毋互乘子右上得二百九圖布算十四右中得二百八十八右下得二百八十三位併之共得八百六十二為實左行分毋相乘得三百三十六為法實如法而一不滿法者各半之合問今有甲錢九分錢之五減其乙錢七分錢之三問餘幾何答曰六十三分錢之八術曰依毋互乘子右上得三十五右圖布算下得二十七以小減多餘八為實左行分毋相乘得六十三為法實如法而一不滿法者命之合問今有甲持絹七分尺之五乙持絹四分尺之三問孰多多幾何答曰乙絹多多二十八分尺之一術曰依毋互乘子右上得二十右下圖布算得二十一以小減多餘一為實分毋相乘得二十八為法實如法而一不滿法者命之合問
