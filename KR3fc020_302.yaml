body:
  text: 自之又高乘之為三段方錐積數也寄左列積三之與寄左相消得開三乘方開之得六尺為方式開平方數加少如得下方二十八尺又六尺自之即高合問今有圓錐積三千七十二尺只云高為實立方開之得數不及下周六十一尺問下周及高各幾何答曰下周六十四尺高二十七尺術曰立天元一為開立方數再自乘為高也再列開立方數加不及為下周也自之又高乘之為三十六段積寄左列積三十六乘之與寄左相四乘方開之消得開方式得三尺為開立方之數加不及得下周六十四尺又列三尺再自乘得高二十七尺合問今有立方立圓平方各一共積一百二十七萬七千七百二十四尺只云立圓
