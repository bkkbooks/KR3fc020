body:
  text: 方面二分之一問四事各幾何答曰立圓徑一十六尺立方面二十四尺平圓徑一十四尺平方面四十八尺術曰立天元一為立圓徑減二尺餘為平圓徑自之就以二十二乘之為二十八段積就分四之為一百一十二段圓密積又列立圓徑加八尺為立方面再自乘又以一百一十二乘之為一百一又列立圓徑十二段立方積也再自乘九因為十六段積又七之為一百一十二段立圓積又列立方面二之為平方面自乘又以一百一十二乘之亦為一百一四位共併為一十二段平方積也百一十二段積寄左列共積一萬八千五百八十六尺以一百一十二乘之得二百八萬一千六百三十二與寄左相消
