body:
  text: 答曰六十五貫五百五十文今有夫匠共五百三十八人每人支工食錢一百九十四文問計錢幾何答曰一百四貫三百七十二文今有木綿三千二百六十匹每匹價錢一貫七百五文問計錢幾何答曰五千五百五十八貫三百文術曰列物數於上各以價錢依法從下身外加之即得合問留頭乘法門二十問留頭乘法別規模起首先從次位呼言十靠身如隔位遍臨頭位破身鋪今有白豆八十四斛每斛價錢二百一十文問計錢幾何答曰一十七貫六百四十文術曰列豆八十四斛於上以斛價二百一十文乘之合問今有胡椒六十三斤四兩每斤價錢三百八十文問計錢幾何答曰二十四貫三十五文
