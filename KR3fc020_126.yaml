body:
  text: 水軍六千三百二十八人糧四千八百八十一碩六㪷步軍九千四百九十二人糧五千八百碩六㪷三分㪷之二術曰列六人七人九人於左行五十三㪷五十四㪷五十五㪷於右行左行互乘右行訖左上得三千三百三十九倍左中得五千八百三十二三因左下得六千九百三十共併又三因之得四萬八千三百三為法左行相乘得三百七十八列共糧通分內子以三百七十八乘之得一億五千二百八十三萬六百九十二為實以四萬八千三百三為法實如法而一得馬軍倍之為水軍三之即步軍也求各糧者列三色軍數各以本色給糧乘之為實以各軍率除之合問新編算學啓蒙卷上
