body:
  text: 段方積寄左又列圓徑自之三因亦為四段圓積內減寄左再寄列畒通步內子四之與再寄相消得開方式平方開之得圓徑內減倍之云數餘即池方合問今有方田內有圓池占之外餘地二畒六步只云四角徑各長九步九分問池徑田方各幾何答曰池徑一十八步甲方二十七步術曰立天元一為池徑加入倍之云數為方斜就分五之為七段方田自之為四十九段方積就分四之為一百九十六段方積也寄左又列圓徑自之三因為四段圓就以四十九乘之亦為一百九十六段圓積以減寄左再寄列畒通步內子以一百九十六乘之與再寄相消得開方數式平方開之得池徑加入倍之角徑
