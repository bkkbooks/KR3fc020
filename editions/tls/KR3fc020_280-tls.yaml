body:
  text: 今有直田一十一畒九分只云長平和取十一分之二長平較取十三分之十較平差取八分之五多於一平二歩問長平各幾何答曰平四十二歩長六十八歩術曰依母互乘子乃得和二百八箇較六百一十圖布筭六箇差七百一十五箇分母相乘得一千一百四十四以多於二歩乘之得二千二百八十八別得一百九長內減一百二十二平餘數立天元一爲長一百九之內減餘數式爲一百二十二段平以長乘之爲一百二十二段積寄左列積以一百二十二乘之與寄左相消得開方式飜法開之得長以長除積得平合問今有直田一十九畒六分只云長取強半平取弱半和取中半較取太半爲共不及二長二歩少半歩問長平各幾何
