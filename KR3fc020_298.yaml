body:
  text: 術曰立天元一為圓徑自之三因為四段圓積以減四之共數得餘為四箇外周開方數自乘為十六箇外周也寄左列徑三之為外周以十六乘之得與寄左相消得開方數式三乘方翻法開之得圓徑十二步三之即周三十六步也今有方𡎲一所計積二百五十八尺只云臺高不及下方二尺却多如上方一尺問上下方及高各幾何答曰上方五尺下方八尺高六尺術曰立天元一為上方加八一尺為臺高高却加二尺為下方自乘得又上方自乘得又上下方相乘得三位併之又以高乘之為三段方臺積寄左列積三之與寄左相消得開方式立方開之得上方五尺加一尺得高六尺就加二尺得下方八尺和問
