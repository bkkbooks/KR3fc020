body:
  text: 答曰牛價七貫五百文人二十五術曰列盈五千爲實列所出率以少減多餘二百爲法實如法而一得人數以適足三百乘之卽牛價合問問不足適足者同此術也今有人持錢買絲不知其數只云買一斤不足五十七文買一十二兩盈一十五文問人持錢及絲斤價幾何答曰人持錢二百三十一文絲斤價二百八十八文術曰依以盈不足維乘之左上得二圖布筭百四十右上得六百八十四併之得九百二十四爲實盈不足相併得七十二爲法又列十六兩內減十二兩餘四兩約法實實爲人持錢法爲絲兩價身外加六卽斤價合問今有人買馬不知其數只云九人出七貫不足四貫七百七人出八貫盈一十
  hash: sha256:77e45a7746d4d4823be42ca5fc3b2a18907a88f038f1ea254b8922e074472b19
