body:
  text: 四角底面一十二箇術曰六之共積得四千一百一十於上位列不及七箇張三位上位倍之加一得一十五中位加一得八下位得七三位互乘得八百四十以減上位餘三千二百七十為實倍不及七加一得一十五自之得二百二十五於上位又列不及七加一倍之得一十六以不及七乘之得一百一十二又加二併入上位共得三百三十九為從方又列不及七加一得八六之得四十八為從廉以三為隅法開立方除之得三角底子一面五箇加不及七箇即四角底子一面一十二箇合問盈不足術門九問今有人分銀不知其數只云人分四兩剩一十二兩人分七兩少六十兩問銀及人各幾何答曰銀一百八兩人二十四
