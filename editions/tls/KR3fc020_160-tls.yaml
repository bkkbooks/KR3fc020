body:
  text: 術曰列銀七鋌以鋌率通之得三百五十兩以差七百五十乘之得二十六萬二千五百爲實以三百兩爲法實如法而一得金兩價也爲法之數乃銀三百五十兩內減金五十而餘數也內減差卽銀兩價又列一百鋌通兩以金兩價乘之得數內減直錢餘二千六百七十二貫二百五十文爲差實以差七百五十文爲法除之得銀兩數反減五千兩餘卽金兩數也各以鋌率約之合問今有油一秤二斤三兩半欲點醮燈只云四盞用油三兩三甌用油五兩須令盞數倍之甌數問甌盞及油各幾何答曰甌八十七隻油九斤一兩盞一百七十四隻油八斤二兩半術曰依左行互乘右行左上倍之得圓歩筭一十八左下得二十併之得三十八爲法左行相乘得十二爲乘法列共油通兩內子得二百七十五兩半以十
