body:
  text: 方面二分之一問四事各幾何答曰立圓徑一十六尺立方面二十四尺平圓徑一十四尺平方面四十八尺術曰立天元一爲立圓徑減二尺餘爲平圓徑自之就以二十二乘之爲二十八段積就分四之爲一百一十二段圓宻積又列立圓徑加八尺爲立方面再自乘又以一百一十二乘之爲一百一又列立圓徑十二段立方積也再自乘九因爲十六段積又七之爲一百一十二段立圓積又列立方面二之爲平方面自乘又以一百一十二乘之亦爲一百一四位共併爲一十二段平方積也百一十二段積寄左列共積一萬八千五百八十六尺以一百一十二乘之得二百八萬一千六百三十二與寄左相消
