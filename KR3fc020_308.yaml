body:
  text: 得開立方開之得立圓徑一十方式六尺加八尺得立方面減二尺爲平圓徑倍立方面卽平方面合問今有立方立圓平方古圓田徽圓田各一共積三萬三千六百二十二尺二百分尺之三十七只云立方面不及立圓徑四尺多如徽圓徑三尺立圓徑如平方面三分之一古圓周與立方面適等問五事各幾何答曰立方面二十四尺立圓徑二十八尺平方面八十四尺古圓周二十四尺徽圓徑二十一尺術曰立天元一爲立方面亦古圓周加不及四尺爲立圓徑再自乘九因爲十六段積以二百二十五乘之爲三千六百段立圓積又列立圓徑三之爲平方面自之爲平方
