body:
  text: 七百九十寸二分七厘二毫乃虛積數以減寄位餘金積寸也寸下分者身外加六爲兩金自方一寸重一斤合問今有茭草積一斤四百八十五束問底面幾何答曰五十四束術曰列積倍之得二千九百七十爲實以一爲從方一爲廉法開平方除之合問今有圓箭二百七十一隻問外周幾何答曰五十四隻術曰列積減一餘以十二乘之得三千二百四十爲實以六爲從方一爲廉法開平方除之合問今有方箭一百四十四隻問外周幾何答曰四十四隻術曰列積減一餘以十六乘之得二千二百八十八爲實以八爲從方一爲廉法開平方除之合問今有三角垛果子積一萬五千一百八十箇問底子一面幾何答曰四十四箇
