body:
  text: 二又以底子乘之得九萬一千八十爲實以六爲法實如法而一合問今有四角垛果子每面底子四十四箇問共積幾何答曰二萬九千三百七十箇術曰列底子添一箇半以底子乘之得數又添半箇又以底子乘之得八萬八千一百一十爲實以三爲法實如法而一合問今有圓毬一隻徑一尺六寸問積幾何答曰二千三百四寸術曰列一尺六寸再自乘又九因得三萬六千八百六十四寸以十六而一合問今有金毬一隻周三尺六寸厚四分問重幾何答曰一百八十一斤一十一兩六錢四分八厘術曰列三尺六寸以三而一得一尺二寸爲虛實之徑再自乘得一千七百二十八寸又九之十六而一得九百七十二寸乃虛實共積也寄位又列徑一尺二寸減上下厚八分餘一尺一寸二分再自乘得一千四百四寸九分二厘八毫又九因十六而一得
  hash: sha256:6ea610c44cc70c67052d7e3b04af165510f3f6806417332a13bda10408051da7
