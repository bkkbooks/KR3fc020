body:
  text: 答曰牛價七貫五百文人二十五術曰列盈五千為實列所出率以少減多餘二百為法實如法而一得人數以適足三百乘之即牛價合問問不足適足者同此術也今有人持錢買絲不知其數只云買一斤不足五十七文買一十二兩盈一十五文問人持錢及絲斤價幾何答曰人持錢二百三十一文絲斤價二百八十八文術曰依以盈不足維乘之左上得二圖布算百四十右上得六百八十四併之得九百二十四為實盈不足相併得七十二為法又列十六兩內減十二兩餘四兩約法實實為人持錢法為絲兩價身外加六即斤價合問今有人買馬不知其數只云九人出七貫不足四貫七百七人出八貫盈一十
  hash: sha256:7cf8d17e0629421c59ee023f3f2fabc5bbca1bc5f331018bc873866f9a0aac7b
