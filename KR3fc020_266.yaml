body:
  text: 開方釋鎖門三十四問今有平方羃四千九十六歩問爲方面幾何答曰六十四歩術曰列羃四千九十六歩爲實借一筭於六歩之下名曰廉法常超一位至百歩下止乃上商六十於廉法之上實數之下亦置六百名曰方法乃命上商除實三千六百實餘四百九十六倍方法得一千二百一退得一百二十廉法再退又上商四歩於廉法之上實數之下亦置四歩方法得一百二十四乃命上商除實恰書合問今有立方羃一萬七千五百七十六尺問爲方面幾何答曰二十六尺術曰列羃一萬七千五百七十六尺爲實借一筭於六尺之下名曰隅法常超二位約實至千尺下止乃上商二十以隅法因上商二十得二千於隅法之上方法之下名曰廉法又廉法因上商二十得四千於廉法之上實數之下名曰方法乃命上商
