body:
  text: 今有圓臺一所計積五千四十尺只云上下周相和得一百八尺高不及上周一十六尺問上下周及高幾何答曰上周三十六尺下周七十二尺高二十尺術曰立天元一爲臺高加一十六尺爲上周以減於相和數爲下周自乘又上周自乘又上下周相乘得三位併之又以高乘之爲三十六段圓臺積寄左列積以三十六乘之與寄左相消得開方數式飜法開之得臺高加不及卽上周又上周減相和數得下周也今有方錐積九千四百八尺只云高爲實平方開之得數少如下方二十二尺問下方及高各幾何答曰下方二十八尺高三十六尺術曰立天元一爲開方數自乘爲高也再列開方數加少如爲下方也
