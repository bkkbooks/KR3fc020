body:
  text: 答曰三千三百一斤一千三百六十三分斤之七百三十七術曰置三千斤以所稅者三十乘之又以五十乘之得四百五十萬為實以不稅者二十九四十七相乘得一千三百六十三為法實如法而一不滿法者命分合問折變互差門十五問今有香油三兩折菜油四兩只云香油斤價四百文却有菜油八十四斤一十二兩問直錢幾何答曰二十五貫四百二十五支術曰列香油斤價以三兩因之十六而一得七十五文乃香油三兩折菜油四兩之價列菜油通兩內子得一千三百五十六兩以七十五文乘之為實以四兩為法除之合問今有人欠錢一萬一千二百五十貫欲還錢銀適等其銀每兩折錢五貫文問各還幾何答曰錢一千八百七十五貫銀一千八百七十五兩
