body:
  text: 和八分之五一十四步問句股弦各幾何答曰句二十一步股二十八步弦三十五步術曰以前分毋四十九乘餘數得一千七十八乃是四十二箇股弦和內減二十八箇句弦和餘數又以後分毋二十四乘不及步數得三百三十六乃是八箇股弦和減一十五箇句弦和餘數也如方程正負術入之依圖以右上遍乘左行仍以右行布算異減同加左行左中餘四百六左下二萬五千五百七十八上法下實而一得六十三步乃股弦和八之加入右下得數以十五約之得五十六步即句弦和立天元一為弦以減股弦和餘為股以減句弦和餘為句自之為句羃又列股自乘為股羃併入句羃與弦羃相消得開方式平方開之得弦減股弦和即股減勾弦和即勾和問
