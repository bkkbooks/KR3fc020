body:
  text: 術曰列田畒數於上以五斛七斗六升乘之通前之問還源於除法內訓導初學務要演熟乘除加減引而伸之身外減法門十一問減法根源必要知即同求一一般推呼如身下須當減言十從身本位除今有錢七貫五百二十四文欲糴芝麻每斗價錢一百一十文問得幾何答曰六碩八斗四升今有錢四貫一百五十二文欲截紅綾每尺價錢一百二十文問得幾何答曰三十四尺六寸今有錢一萬一千三百四十九貫欲買高茶每引價錢一十三貫文問得幾何答曰八百七十三引今有地不記畒數只云每畒納稅糧一升四合今共納四碩五斗三升六合問地幾何答曰三碩二十四畒今有梔子二千九百七十斤每稱重一十五斤問為稱幾何
  hash: sha256:1cb2be165ea8020fb90b99ea5b48efbb9540e047d0c63f44755e12f938383f6a
