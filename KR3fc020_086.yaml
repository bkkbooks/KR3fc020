body:
  text: 今有銀一十五兩一錢六分三釐二毫每銀七釐二毫換片腦一銖問得幾何答曰五斤七兩一十八銖術曰列銀數為實以七釐二毫為法除之得二千一百六銖以斤銖法三百八十四約之得五斤不滿法者以兩銖法二十四約之得七兩不滿法者命之合問今有錢五百九十一貫九百四十八文欲買銀朱兩價八十七文問得幾褁答曰一百八十九褁術曰列錢數為實以八十七文為法實如法而一得六千八百四兩以褁法三十六約之合問今有細米七斗九升五谷三勺四抄每九升一合準糲米以斗問得幾何答曰八斗七升四合術曰列米數為實以九升一合為法實如法而一合問今有香油二百五十六斤半每三斤一十二兩用芝麻一斗問用芝麻幾何
  hash: sha256:d5fec388c6efbd0b67bd07605f4dab58a1c6a9e9233592e99a9a6108cf976fce
