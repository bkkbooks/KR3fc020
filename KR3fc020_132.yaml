body:
  text: 答曰八分術曰列徑一十六歩自乘得二百五十六三之四而一得一百九十二爲田積歩以畒法除之合問今有圓田一段不記徑歩只云周五十四歩問爲田幾何答曰一畒一厘二毫半術曰列周五十四歩自乘得二千九百一十六以十二而一得二百四十三歩爲田積也以畒法而一合問今有晥田一段下周六十四歩徑三十三歩問爲田幾何答曰二畒二分術曰列周六十四歩以徑三十三歩乘之得二千一百一十二以四而一得五百二十八爲田積歩以畒法二百四十歩除之晥田宗田同圓田法一也合問今有弧田一段矢闊一十四歩弦長二十八歩問爲田幾何答曰一畒二分二厘半
  hash: sha256:c340d7d642dbf553fb100f8b00c32725d0c36ecd8960a74c85e54dbce5b78333
