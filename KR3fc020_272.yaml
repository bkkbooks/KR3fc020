body:
  text: 術曰列全歩通分內子得一千八百七十五以十二乘之得二萬二千五百又分毋四再自乘得六十四乘之得一百四十四萬爲實以一爲廉平方開之得一千二百又分毋自乘得十六而一合問今有直田八畒五分五釐只云長平和得九十二歩問長平各幾何答曰平三十八歩長五十四歩術曰立天元一爲平以減云數餘爲長用平乘起爲積寄左列畒通歩與寄左相消得開方式平方開之得平以減和歩卽長和問按此以古法演之和歩自乘得八千四百六十四乃是曰段直積一段較羃也列積四之得八千二百八減之餘有較羃二百五十六爲實以一爲廉平方開之得較一十六歩加和半之得長長內減較卽平也今以天元演之明源活法省功數倍假立一筭於太極之下如意求之得方廉隅從正負之段乃演其處積相消相長而脫其眞積也子故於逐問備立細草圈其縱橫明其正負使學者粲然易曉也今有直田五畒八十八歩只云長平併之得七
