body:
  text: 答曰六碩八㪷四升術曰列油數爲實以三斤七分半爲法除之合問今有麵四百零七斤每六斤一十四兩用麥一㪷問用麥幾何答曰五碩九㪷二升術曰列麺數爲實以六斤八分七厘半除之八分七厘半者乃十四兩留數合問今有鹽二千四百六十引每引四百五斤爲率今每引外多附餘三十斤問共爲引數幾何答曰二千六百四十二引九十斤術曰列鹽引數於上併率數附餘共得四百三十五斤乘之得一百七萬一百斤爲實以四百五斤爲法除之不滿法者命之合前問今有荳粉一千七百五十九斤三兩八錢每五斤六兩用荳以㪷問荳幾何答曰三十二碩七㪷三升術曰列粉數斤下留兩爲實以五斤三分
  hash: sha256:48bb97c0a974247354ddb485717cc5e2ad3ff01e403f5a5c1ad6084ef8b78116
