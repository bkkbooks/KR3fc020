body:
  text: 松庭朱世傑編撰田畒形段門十六問今有方田一段自方九十六步問為田幾何答曰三十八畒四分術曰列九十六步自乘得九千二百一十六步為田積也以畒法二百四十步除之合問今有直田一段長四十九步闊二十四步問為田幾何答曰四畒九分術曰列長四十九步以闊二十四步乘之得一千一百七十六步為田積也以畒法二百四十步除之合問今有勾股田一段勾三十六步即闊股六十二步即長問為田幾何答曰四畒六分五釐術曰列股六十二步以勾三十六步乘之折半得一千一百一十六步為田積也以畒法而一合問
