body:
  text: 今有梯田一段東闊四十六步西闊八十六步長一百二十五步問為田幾何答曰三十四畒三分七厘半術曰列東闊併入西闊半之得六十六步為停闊以長步乘之得八千二百五十為田積步以畒法而一合問今有圭一段九十三步闊三十四步問為田幾何答曰六畒五分八厘七毫半術曰列長九十三步以闊三十四步乘之折半得一千五百八十一為田積步以畒法而一合問今有圓田一段周八十四步徑二十八步問為田幾何答曰二畒四分五厘術曰列周八十四步以徑二十八步乘之得二千三百五十二以四而一得五百八十八為田積步以畒法而一合問今有圓田一段不記周步只云徑一十六步問為田幾何
  hash: sha256:5736c458d4119b8c3307bbe3aa04d025cb092d32fa657379ae4e6c1eb82200fc
