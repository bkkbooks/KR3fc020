body:
  text: 術曰列弦長二十八步加入矢濶一十四步共得四十二步以矢濶一十四步乘之折半得二百九十四步為田積也以畒法二百四十步約之合問今有錢田一段外周一百八步內池方九步問為田幾何答曰三畒七分一厘二毫半術曰列外周自乘得一萬一千六百六十四以十二除之得九百七十二步寄位又列池方九步自乘得八十一以減寄位餘八百九十一為田積步以畒法二百四十步約之合問今有方田一段自方八十四步內有圓池周一百四十四步問為田幾何答曰二十二畒二分術曰列八十四步自乘得七千五十六步寄位又列池周步自乘得二萬七百三十六以十二而一得一千七百二十八步為池積以減寄位餘五千三百二十八為田積步以畒法除之合問
