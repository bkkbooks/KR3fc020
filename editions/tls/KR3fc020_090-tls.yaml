body:
  text: 七厘半爲法實如法而一合問今有一萬尺每一尺二分四厘換麻一斤問換麻幾何答曰九千七百六十五斤十一兩術曰列數爲實以一尺二分四厘爲法實如法而一斤下分者身外加六爲兩合前問今有錢二萬貫欲買細絲斤價四貫九十六文問得絲幾何答曰四千八百八十二斤一十三兩術曰列錢數爲實以斤價四貫九十六文爲法除之斤下分者身外加六爲兩合問今有米三萬㪷每八升一合九勺二抄折荳一㪷問折荳幾何答曰三千六百六十二碩一㪷九合三勺七抄五撮術曰列米數爲實以八升一合九勺二抄爲法實如法而一合問今有芝麻四萬碩每五升一合二勺對粟一㪷問對粟幾何
  hash: sha256:2d15a64c1609732d76aefaeb70b4916818361b707b387ad44be55fbfe03dfd45
