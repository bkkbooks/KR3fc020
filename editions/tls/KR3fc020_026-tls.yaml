body:
  text: 明正負術其同名相減則異名相加正無人負之負無人正之其異名相減則同名相加正無人正之負無人負之按九章註云兩筭得失相返要令正負以名之正筭赤負筭黑不則以邪正爲異其無人者爲無對也無所得減則使消奪者居位也人作入非明乘除段長平相併曰和長平相減曰較長平相乘曰積自相乘之曰羃同名相乘爲正異名相乘爲負平除長爲小長長除平爲小平小長平相併曰小和小長平相減餘小較小長平相乘得一歩爲小積明開方法置積爲實及方廉隅同加異減開之新編筭學啓蒙總括終
