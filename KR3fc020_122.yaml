body:
  text: 二斗二升八合故為法也得細米數倍之為糙米合問今有鹽五千七百引欲令大船一停小船二停載之只云大船三隻載五百引小船四隻載三百引間各幾何答曰大船一十八隻小船三十六隻術曰列三隻四隻於左行五百三百於右行毋互乘子右上得二千石下倍之得一千八百二位併之得三千八百為法左行分毋相乘得一十二以乘五千七百引得六萬八千四百為實實如法而一得大船倍之即小船合問今有馬軍七人給腿裙絹二匹二丈步軍六人給胖襖絹四匹三丈二尺今共有絹六千六百二十二匹四尺欲給馬步軍人適等問各幾何匹法三十八尺答曰各五千六百七十人術曰先列七人於左上六人於左下又列九十六尺於右上一百八十四尺於右下
  hash: sha256:0d88351d83130f2046176b9cf5c9d9d7c1c4328c3903b07997432f4a9840df4b
