body:
  text: 答曰二萬貫術曰列白檀共數斤下留兩於上以四貫九十六文乘之合問今有黍三千六百六十二碩一斗九合三勺七抄五撮每斗對麥八升一合九勺二抄問對麥幾何答曰三萬斗術曰列共黍於上以八升一合九勺二抄乘之合問今有粟七萬八千一百二十五碩每斗為御米五升一合二勺問米幾何答曰四萬碩術曰列共粟於上以五升一合二勺乘之合前問今有降真二十四萬四千一百四十斤一十兩每斤直銀二錢四釐八毫問直銀幾何答曰五萬兩術曰列降真共數斤下留兩於上以二錢四釐八毫乘之合問
