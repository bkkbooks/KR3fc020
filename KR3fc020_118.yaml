body:
  text: 云每粟一㪷凖米六升豆入升折粟一㪷本粟一㪷止纳一㪷須令三色適等納之問各停納幾何答曰各二百二十七碩一㪷術曰列共粟以米六升乘之得五千三百三十六㪷八升五合爲實以二㪷三升五合爲法實如法而一爲法數者各以六升爲率米折粟一㪷豆折粟七升五合本粟六升三位併之共得二㪷三升半爲法也合問今有足邑金五十兩欲爲八分金間入銀幾何答曰一十二兩五錢術曰列金數爲實以八分爲法而一得六十二兩五錢內減五十兩餘卽入銀合問今有銀一十二兩五錢足色金五十兩併而同煉問爲顏色分數幾何答曰八分邑術曰列金五十兩爲實併金銀得六十二兩五錢爲法實如法而一合問今有絲六十二斤半換金一十兩內八分半金五兩七分半金五兩間二色金
