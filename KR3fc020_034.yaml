body:
  text: 附釋凡魚豕之訛已見識誤矣其或術文不顯茍非釋明無以探源故復附釋干次上卷庫務解稅弟十一術以不稅者二十九四十七相乘案先稅三十分取一以子減母餘不稅者二十九次稅五十分取三亦以子減母餘不稅者四十七折變互差弟二術列缺錢數五之為實以二十為法案為法之數各以銀一兩錢一貫為適等之率銀一兩折錢五貫合錢一貫共得六貫因缺錢數五之故亦五通六貫得三十為法又術省乘較捷折變互差弟三術列缺錢數五之為實以五十五為法案此與弟二術同唯弟二問銀錢適等此則二分銀一分錢故以銀二兩折錢十貫合錢一貫共得一十一貫亦五通得五十五為法又術較捷折變互差弟八術列共粟以米六升乘之為實以二㪷三升五合為法案共粟既以米六升乘之是六升為分母矣故以分母通粟一㪷得粟六㪷副置上中下三位各以
