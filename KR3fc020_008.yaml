body:
  text: 其舊但各標于誤字㫄别記刊誤于卷末示不誣也羅君又以爲此書七證之外兼有四奇昔盛德璋太僕儀譔嘉靖惟揚志及此書原序結尾署惟揚學算趙城元鎮惟揚二字相同或疑元至正二十二年壬寅始改揚州爲維揚府在此書大德三年後其時不應有惟揚之偁且惟與維字又各異不知宋寶祐志已據禹貢淮海惟揚州作惟揚矣見嘉靖志注至惟維皆肋語辭古本通用韻會謂毛詩助辭多用維害及論語則用惟是趙爲吾鄉人無疑當元大德時曾爲朱氏刻梓二書今吾鄉揚州從事于斯者正復雲集遺澤未凐二書又先後爲吾鄉人所校覈刊行其奇者一也趙序謂將見拔茅連茹備清朝之選在大德時不過尋常頌語而竟爲我天朝預兆其奇者二也此書成于大德己亥七月旣堅乃歴今五百四十年計都中寄此書到揚州年月日悉符其奇者三也元于嘉慶之初得玉鑑令于道光十九年予告歸惟揚又見啟蒙且目見羅君等筭斠刊刻樂觀厥成其奇者四也至于庫務解稅折變互差
