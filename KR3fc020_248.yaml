body:
  text: 方程正負門九問今有羅四尺綾五尺絹六尺直錢一貫二百一十九文羅五尺綾六尺絹四尺直錢一貫二百六十八文羅六尺綾四尺絹五尺直錢一貫二百六十三文問羅綾絹尺價各幾何答曰羅九十八文綾八十五文絹六十七文術曰便以右行直減中左二行依圖中行羅正一綾正一絹負布筭二錢正四十九左行羅正二綾負一絹負一錢正四十四又以右上羅四尺遍因中左二行仍用右行同減異加中行羅空綾正一絹正十四錢正一貫二十三文又以右行二次同減異加左行羅空綾正十四絹正十六錢正二貫二百六十二文又以中行綾十四次直減左行
  hash: sha256:5bbaa99d5858cd4af963516397238c3097e9770c6ff19dd54c358ab3685e24e3
