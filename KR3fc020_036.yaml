body:
  text: 米六升豆八升粟一㪷除之上得米一㪷中得豆七升五合下得粟六升并之得二㪷三升五谷折變互差弟十二術列粟數以五升一合二勺乘之為實以二㪷二升八合為法案此與弟八術同唯此則糙米二停故以上文乘率五升一合二勺為分母通粟一㪷得粟五㪷一升二合副置上下二位上位倍之為糙米二停各以糙米八升細米五升一合二勺除之上得糙米一㪷二升八合下得細米一㪷并之得二㪷二升八合中卷田畝形段弟十五術副置濶二十八步上位六之為長下位倍之為廣乃長廣相乘得九千四百八步乃是二箇四分半積以二箇四分半除之為田積步案濶即斜也此形田中心積為一段斜自乘羃并田四隅積亦一段斜自乘羃其田四邊積則為四段斜乘方羃合而計之乃倍斜乘二方一斜之和羃故倍下位為廣其長當為二方一斜之和然方
