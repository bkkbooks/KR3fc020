body:
  text: 今有望海島立二表各五丈丈當作步相去千步前後參直從前表却行一百二十三步人目著地取望島峰與前表參齊復從後表却行一百二十七步人目著地取望島峯亦與後表參齊問島高及島距前表幾何答曰島高四里五十五步島距前表一百二里一百五十步六尺為一步三百步為一里術曰以表高乘表間以相多為法除之得島高以前表却行乘表間以相多為法除之得島逺按表高者五步也表間者千步也前表却行者一百二十三步也相多者前後表却行相減之餘四步也每退千步得嬴四步故嬴滿表高是得島高每進千步遆減四步故減盡却行是得島逺然島高必須更加表高方準今有竿不知其高從竿腳量距二十五尺立十尺之表表後五尺立四尺窺穴望見表端與竿參齊問竿高幾何答曰四十尺術曰以窺穴減表高得六尺以乘量距為實以表後為法除之又加表高得竿高按距逺五六得高六六更加窺下是得竿高
