body:
  text: 徽宻三積各幾何答曰古積二千九百九十七尺徽積二千八百六十三尺一百五十七分尺之五十九宻積二千八百六十尺二十二分尺之一十七古法曰列下周五丈四尺自乘得二千九百一十六尺以高三丈七尺乘之得一十萬七千八百九十二尺爲實以三十六爲法實如法而一得古積合問徽術曰下周自乘又高乘之又以二十五乘之得二百六十九萬七千三百爲實以九百四十二爲法實如法而一爲法數者乃圓法十二乘半徽周七十八分半故爲法也不滿法者各以六約之得徽積合問宻術曰下周自乘又高乘之又以七因之得七十五萬五千二百四十四爲實以二百六十四爲法實如法而一爲法之數乃圓法十二乘宻周二十二故爲法不滿法者各以十二約之合問
