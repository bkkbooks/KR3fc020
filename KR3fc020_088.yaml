body:
  text: 答曰六碩八斗四升術曰列油數為實以三斤七分半為法除之合問今有麵四百零七斤每六斤一十四兩用麥一斗問用麥幾何答曰五碩九斗二升術曰列麵數為實以六斤八分七釐半除之八分七釐半者乃十四兩留數合問今有鹽二千四百六十引每引四百五斤為率今每引外多附餘三十斤問共為引數幾何答曰二千六百四十二引九十斤術曰列鹽引數於上併率數附餘共得四百三十五斤乘之得一百七萬一百斤為實以四百五斤為法除之不滿法者命之合前問今有豆粉一千七百五十九斤三兩八錢每五斤六兩用豆以斗問豆幾何答曰三十二碩七斗三升術曰列粉數斤下留兩為實以五斤三分
