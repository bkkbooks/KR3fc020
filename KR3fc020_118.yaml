body:
  text: 云每粟一斗凖米六升豆入升折粟一斗本粟一斗止納一斗須令三色適等納之問各停納幾何答曰各二百二十七碩一斗術曰列共粟以米六升乘之得五千三百三十六斗八升五合為實以二斗三升五合為法實如法而一為法數者各以六升為率米折粟一斗豆折粟七升五合本粟六升三位併之共得二斗三升半為法也合問今有足邑金五十兩欲為八分金間入銀幾何答曰一十二兩五錢術曰列金數為實以八分為法而一得六十二兩五錢內減五十兩餘即入銀合問今有銀一十二兩五錢足色金五十兩併而同煉問為顏色分數幾何答曰八分邑術曰列金五十兩為實併金銀得六十二兩五錢為法實如法而一合問今有絲六十二斤半換金一十兩內八分半金五兩七分半金五兩間二色金
