body:
  text: 答曰一百九十八稱今有絲六萬一千六百兩每斤重一十六兩問為斤幾何答曰三千八百五十斤今有錢七貫四百一十二文欲令一十七人分之問人得幾何答曰四百三十六文今有糧五千八百八十六碩欲給貧難每戶一碩八㪷問戶給幾何答曰三千二百七十戶今有錢六十五貫五百五十文欲買苧絲每尺價錢一百九十文問得苧絲幾何答曰三百四十五尺今有錢一百四貫三百七十二文欲買麻布每匹價錢一百九十四文問買布幾何答曰五百三十八匹今有錢五千五百五十八貫三百文欲買松木每株價錢一貫七百五文問買
