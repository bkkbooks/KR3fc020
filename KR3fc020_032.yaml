body:
  text: 以十六乘之減云數案云數非減數據術以字錯簡當在乘之之下作以減云數開方釋鎖弟十九問小積式案下層天元羃一負當超二位與中層四天元正上下相齊原式誤未超位開方釋鎖弟二十問開方式案中層方三步七分半當為負誤作正開方釋鎖弟二十一問以減較步餘為小方面案較非本數據術以減當作內減直積式案中層十七天元當為負誤作正開方釋鎖弟二十四問又加差羃得方式案下層天元羃四當為正誤作負開方釋鎖弟二十五問又列較步減中方面案較為天元無步數也又中方面非減數據術步當作以求差分和弟四問補交換一隻而稱之案
