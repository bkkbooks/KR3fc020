body:
  text: 五文問得得米幾何答曰三百六十九斗術曰列只有錢數以五十三斗四升乘之為實以九貫八百七十九文為法實如法而一合問今有銀二十二兩五錢二分半倒絲六斤一十兩只有絲三百四斤一十二兩問倒銀幾何答曰一千三十六兩一錢半術曰列只有絲數斤下留兩以二十二兩五錢二分半乘之為實以六斤六分二釐半為法實如法而一六分二釐半者乃十留六二五合問今有絲六斤一十兩直銀二十二兩五錢二分半只有銀一千三十六兩一錢半問得絲幾何答曰三百四斤一十二兩術曰列只有錢數以六斤六分二釐半乘之為實以二十二兩五錢二分半為法除之斤下分者身外加六為兩合問今有人借絹一匹一丈四尺闊一尺八寸今還
