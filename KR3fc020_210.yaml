body:
  text: 其二石二鈞八斤一十兩稱價四百五十七文其二十四石三鈞一十斤二兩一十八銖稱價四百五十六文術曰列椒通銖得一百二十六萬二千八百九十八為法列錢以五千七百六十乘之得五億七千六百為實實如法而一得四百五十六文為賤稱價內加一文即貴稱價不盡一十一萬八千五百一十二反減下法餘一百一十四萬四千三百八十六以石鈞斤兩銖法除之得二十四石三鈞一十斤二兩一十八銖為賤數其不盡一十一萬八千五百一十二以石鈞斤兩銖法除之得二石二鈞八斤一十兩即貴數合問今有錢二百五十貫買桂花一十二石三鈞一稱一十三斤九兩四銖欲其貴賤斤率之問各幾何答曰其五石一稱一十三斤五兩八
