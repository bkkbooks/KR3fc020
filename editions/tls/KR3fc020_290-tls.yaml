body:
  text: 餘一千二百六十八歩又云小方羃內減大方面餘七百四十八歩問大小方面各幾何答曰大方面三十六歩小方面二十八歩術曰立天元一爲小方面自乘內減又云數爲大方面自之爲大方羃寄左又列小方面加入先云數亦爲大方羃與寄左相消三乘方飜法開之得開方式得小方面加入先云數共得一千二百九十六爲實一爲廉平方開之得大方面合問今有直積二千六十五歩只云較乘和得二千二百五十六歩問長平各幾何答曰平三十五歩長五十九歩術曰立天元一爲平自之爲平羃式
