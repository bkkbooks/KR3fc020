body:
  text: 明正負術其同名相減則異名相加正無人負之負無人正之其異名相減則同名相加正無人正之負無人負之按九章注云兩算得失相返要令正負以名之正算赤負算黑不則以邪正為異其無人者為無對也無所得減則使消奪者居位也人作入非明乘除段長平相併曰和長平相減曰較長平相乘曰積自相乘之曰羃同名相乘為正異名相乘為負平除長為小長長除平為小平小長平相併曰小和小長平相減餘小較小長平相乘得一步為小積明開方法置積為實及方廉隅同加異減開之新編算學啓蒙總括終
