body:
  text: 二十七分尺之八十七術曰置甲率一十萬乙率八萬丙率六萬四千丁率五萬一千二百戊率四萬九百六十已率三萬二千七百六十八為差副併得三十六萬八千九百二十八為法以絲四千八百六十斤乘未併者甲得四億八千六百萬乙得三億八千八百八十萬丙得三億一千一百四萬丁得二億四千八百八十三萬二千戊得一億九千九百六萬五千六百已得一億五千九百二十五萬二千四百八十各為列實各實如法而一不滿法者各以八百六十四約之各得分絲之數也求錦者置二斤通兩內子得三十六兩以分毋四百二十七乘之得一萬五千三百七十二為法各列絲通分內子得數各以十六乘之甲得九百萬乙得七百二十萬丙得五百七十六萬丁得四百六十萬八千戊得三百六十八萬六千四百已得二百九十四萬九千一百二十各自為實實
