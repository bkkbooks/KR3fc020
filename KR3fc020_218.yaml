body:
  text: 松庭朱世傑編撰之分齊問門九問今有五十六分之二十一問約之幾何答曰八分之三術曰先列分毋五十六於上位次列分子二十一於下位以子兩次減其毋餘一十四毋復減其子餘七子又減其毋亦餘七乃得等數爲約法別列分毋五十六分子二十一各以法約之合問但有除分者餘不盡之數不可棄之棄之則不合其源可以爲之分言之之分者乃乘除往來之數還源則不失其本也故九章設諸分於篇首者爲何謂之分者乃開筭之戶用也緣其義閎遠其術奧妙是以學者造之鮮矣故張日建有云不患乘除之爲難而患通分之爲難是也且合減課分之術乃羣其毋而齊其子毋法子實而一平分者毋互乘子副併爲平實毋相乘爲法以列數乘未併者各爲列實以列數乘法減多益少而平經分者錢爲實人爲法而一重有分者同而通之乘分者子相乘爲實毋相乘爲法而一約分者治數之繁也設有四分之二減而言之卽二分之一也可約則約可半則半比類前問欲買馬五十六匹已買二十一匹問幾分中買訖幾分答曰八分中買三分也今有甲絲八分兩之七乙絲七分兩之六丙絲六分兩之五問合之得幾何
