body:
  text: 如法而一得匹實不滿法以匹法三十二乘之如前法而一得尺不滿法者各以三十六約之合問今有某州所管九等稅戶甲等三百六十四戶乙等三百九十六戶丙等四百三十二戶丁等五百七十戶戊等五百八十四戶已等六百七十六戶庚等八百五十戶辛等九百二十戶壬等一千六百八戶今科糧六萬五千六百六十四碩今作等數各差一碩六㪷配之問每戶及逐等各幾何答曰甲每戶一十八碩五㪷三升二合半三百六十四戶共六萬七千四百五十八㪷三升乙每戶一十六碩九㪷三升二合半三百九十六戶共六萬七千五十二㪷七升丙每戶一十五碩三㪷三升二合半四百三十二戶共六萬六千二百三十六㪷四升丁每戶一十三碩七㪷三升二合
