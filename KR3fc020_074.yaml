body:
  text: 今有鹽一千九百二十引每引換黃蠟三十一斤四兩問換黃蠟幾何答曰六萬斤術曰列共鹽引數於上以三十一斤二分半乘之合問今有細絲一千九百五十三斤二兩每斤直銀一兩一十一銖八絫四黍問直銀幾何答曰七萬銖術曰列細絲共數斤下留兩於上列一兩以二十四銖通之內子共得三十五銖八絫四黍乘之合問今有黃金一萬二千八百兩每兩買地六畒二分五釐問買地幾何答曰八萬畒術曰列金數於上以六畒二分五釐乘之合前問今有田一百五十六頃二十五畒每畒收稻五斛七斗六升問收稻幾何答曰九萬斛
