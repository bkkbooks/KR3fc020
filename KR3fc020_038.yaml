body:
  text: 五斜七云者約率也實則斜率七其二方一斜之和爲一十七又七分之一通分內子得一百二十爲七段二方一斜之和率爲法之數當以七段和率一百二十椉田濶以七段斜率四十九除之爲田長各以二十約之得和率六斜率二箇四分半解見四元玉鑑鎖套吞容弟九問細艸下差分均配弟四術列共分錢內虛加一貫八百爲實併各人分率得一十一爲法案乙如甲五分之三卻多如丙錢一貫八百今旣虛加多丙錢一貫八百則是丙與乙等各爲三分甲獨爲五分故并甲乙丙三人分率得一十一分下卷開方釋鎖弟十五術夾注別得一百九長內減一百二十二平餘數案此其率者以上文夾注和二百八箇卽二百八平二百八長也較六百一十六箇卽六百一十六長內減六百一十六平也差七百一十五箇卽一千四百三十平內減七百一十五長也三數相并得一千二十二平一百九長之共數于上
  hash: sha256:0bbfa746507761edaa97ad57bab1e3014b066385e2fd6fb3e8ebc4319e345b53
