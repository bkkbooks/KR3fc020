body:
  text: 金序守全南道全州府尹案明史列傳二百八朝鮮傳王京爲朝鮮八道之中東阻鳥嶺忠州西則南原全州道相通又嘉靖八年八月陪臣柳溥上言國祖李旦係本國全州人據此則全當時全字趙序續撰重羌案羌當作差重差見九章序趙城亢鎮案亢當作元玉鑑祖序趙元鎮已與之版而行矣元鎮者博雅之士也九歸除法歌括四一二十一案二十一據數當爲二十二九歸除法弟二十七問易䐉幾何案集韻䐉側吏側持二切訓肥貌與問不協據上文當作腦折變互差弟十三問小字雙行注石下倍之案上文右上得二千此則石下當作右下折變互差弟十五問
