body:
  text: 術曰立天元一爲小長內減云數餘爲小平以小長乘之爲小積與小積一筭相消得開方式平方飜法開之得小長四歩以除直積得一千二十四歩爲大平羃平方開之得大平三十二歩以小長乘之卽大長也合問今有大小方田二段共積六千五百二十九歩只云小方面乘大方面得三千一百二十歩問二方面各幾何答曰大方面六十五歩小方面四十八歩術曰别得今數爲弦羃云數爲直積倍之減弦羃餘有二百八十九歩平方開之得較一十七歩立天元一爲大方面以減較歩餘爲小方面以大方面乘之爲直積與只云數相消得開方式平方飜法開之得大方面減較卽小方面合問今有大小方田二段只云大方羃內減小方面
