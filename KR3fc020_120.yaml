body:
  text: 每兩直絲幾何答曰八分半直六斤一十兩二錢五分七斤半直五斤一十三兩七錢五分術曰置絲通兩為實列五兩以八分半乘之又列五兩以七分半乘之得數併之得八兩乃是十分金數為實如法而一得一百二十五兩乃一兩金之絲數也副置上以八分半乘之下以七分半乘之又各以斤率約之合問今有粟一十九碩六㪷八合欲為糙細二米糙米八升用粟一㪷細米五升一合二勺用粟一㪷須令糙米倍之細米之數問各幾何答曰細米四碩四㪷三合二勺糙米八碩八㪷六合四勺術曰列粟數以五升一合二勺乘之得一百㪷三升九合二勺九抄六撮為實以二㪷二升八合為法實如法而一為法之數各以五升一合二勺為率細米一停折粟一㪷糙米二停折粟一㪷二升八合二位併之共得
  hash: sha256:c1d809d06558739d8441560251866c9f2ea56119443c11a9744cb44cc00040a0
