body:
  text: 庫務解稅門十一問今有人典錢八十五貫七百文每貫月利三十文今八箇月問利錢幾何答曰二十貫五百六十八文術曰列本錢八十五貫七百於上位置八箇月以三十文乘之得二百四十文以乘上為即得而今有之合問今有人典錢二百三十六貫每貫月利三十五文今七箇月九日問利錢幾何答曰四十三貫七十文術曰列九日以三十日除之得三分加入七箇月共得七箇月三分以二十五文乘之得數以乘本錢二百三十六貫合問今有人借銀二十五兩每兩月利二分五釐問幾何日二本利適等答曰四十箇月術曰列借銀為實以六錢二分五釐為法實如法而一為法之數乃是二分五釐乘借銀故為法合問又術曰列銀一兩為實以二分半為法實如法而一亦合前問
  hash: sha256:9c3db42e1d1d31a20a645c12eaf9f17c10236305d922cd8cf42644a597d44c4b
