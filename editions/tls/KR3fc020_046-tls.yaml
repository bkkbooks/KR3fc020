body:
  text: 學因得復昌是書在元時爲趙氏所刊趙爲惟揚人乃惟揚轉不可復得不知何時流入彼中足見逺人嚮學知重是書重爲刊梓厯五百餘歲而得以復歸故土豈非朱氏與吾鄉有緣抑斯文未墜冥冥中有嘿爲呵護者邪是書匪特與玉鑑堪爲表裏且可與宋已前諸古筭書互相參覈以斠今法之異同似淺實深昔梅徵君謂歸除歌括始于前明吳信民九章比類是書九歸除法惟一歸如一進五歸添一倍九歸隨身下三句與今文小異餘悉相同證以楊氏椉除通變筭寶卷中所載九歸新括案楊書九歸新括下云以古句人注兩存之其大字古句在上云歸數求成十歸餘自上加半而爲五計定位退無差其每句下小字雙行注云九歸見一下見四五作五遇九成十其八歸見一下二見四作五遇八成十其七歸見一下三見三五作五遇七成十諸語雖文句不同而信非始于吳信民也可知徵君又謂古算用籌一至五皆從列六至九皆横一于上以當五是書明從横訣一從十横百立千僵凡十二句與孫子筭經夏侯陽筭經約略并同證以乾鑿度卧算爲年立算爲日要皆詳明筭位固不厪爲用籌言之也若夫古人行文有與今法不同者如今之所謂弦和較卽句較和亦卽股較較古則單言
