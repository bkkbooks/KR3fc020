body:
  text: 今有官倉共收粮一千八百一十一碩三㪷一升四勺每㪷帶耗七合五勺六抄問正粮幾何答曰一千六百八十四碩術曰列共收粮爲實併正耗粮得一㪷七合五勺六抄爲法實如法而一合問今有稅務法則三十貫納稅一貫客持絲六百四十斤斤價三貫二百五十二文問納稅錢幾何答曰六十九貫三百七十六文術曰列絲數以斤價乘之得二千八十一貫二百八十文又以一貫乘之爲實以三十貫爲法實如法而一而今有之合問今有客持香七百八十四斤舶司稅之八而取一今稅一百斤却貼與客錢一貫七百三十文問斤價幾何答曰八百六十五文術曰列客持香數以八而一得九十八斤乃何稅之香數以減一百斤餘二斤爲法列貼與客錢爲實實如法而一得斤價也合問
