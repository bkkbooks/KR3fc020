body:
  text: 除實八千實餘九千五百七十六以隅法因上商二十加入廉法又廉法因上商二十加入方法又隅法因上商二十加入廉法方法得一萬二千廉法得六千方法一退廉法再退隅法三退續又上商六尺以隅法因上商六尺加入廉法又廉法因上商六尺加入方法得一千五百九十六乃命上商除實恰書合問今有積五萬九千四百一十四步一十六分步之一問為平方面幾何答曰二百四十三步四分步之三術曰列全步通分內子得九十五萬六百二十五為實以一為廉平方開之得九百七十五乃每面積分也又列分毋為實一為廉平方開之得四報除得二百四十三步不滿法者命之合問今有積一十三萬三千七百六十八尺三百四十三分尺之二百八十八問為立方面幾何答曰五十一尺七分尺之一
