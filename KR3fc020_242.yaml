body:
  text: 甲米一碩八㪷五升乙粟二碩六㪷五升術曰假令甲米二碩一㪷有餘一㪷令之一碩五㪷不足一㪷四升盈不足術求之依圖維乘上二位相併得四碩四㪷布算四升為實以盈不足相併得二㪷四升為法實如法而一得甲米反減四碩五㪷餘即乙粟按此甲米二碩一㪷乙粟二碩四㪷以六因之得米一碩四㪷四升併之得三碩五㪷四升課於三碩四㪷四升外多一㪷故曰有餘若令甲米一碩五㪷乙粟三碩以六因之得米一碩八㪷併之得三碩三㪷課於三碩四㪷四升外少一㪷四升故曰不足合問今有人携酒遊春不知其數只云遇務而添酒一倍逢花而飲三㪷四升今遇務逢花俱各四次酒盡壺空問元携酒幾何答曰三㪷一升八合七勺半術曰假令元酒三㪷二升有餘二升令之元酒三㪷不足三㪷乃以盈不足術求之依圖維乘上二位相併得一碩二升布算為實以盈不足相併得三㪷二
