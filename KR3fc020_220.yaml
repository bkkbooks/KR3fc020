body:
  text: 答曰二兩一百六十八分兩之九十五術曰依毋互乘子右上得二百九圖布筭十四右中得二百八十八右下得二百八十三位併之共得八百六十二爲實左行分毋相乘得三百三十六爲法實如法而一不滿法者各半之合問今有甲錢九分錢之五減其乙錢七分錢之三問餘幾何答曰六十三分錢之八術曰依毋互乘子右上得三十五右圖布筭下得二十七以小減多餘八爲實左行分毋相乘得六十三爲法實如法而一不滿法者命之合問今有甲持絹七分尺之五乙持絹四分尺之三問孰多多幾何答曰乙絹多多二十八分尺之一術曰依毋互乘子右上得二十右下圖布筭得二十一以小減多餘一爲實分毋相乘得二十八爲法實如法而一不滿法者命之合問
