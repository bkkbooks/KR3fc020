body:
  text: 七厘半為法實如法而一合問今有一萬尺每一尺二分四厘換麻一斤問換麻幾何答曰九千七百六十五斤十一兩術曰列數為實以一尺二分四厘為法實如法而一斤下分者身外加六為兩合前問今有錢二萬貫欲買細絲斤價四貫九十六文問得絲幾何答曰四千八百八十二斤一十三兩術曰列錢數為實以斤價四貫九十六文為法除之斤下分者身外加六為兩合問今有米三萬㪷每八升一合九勺二抄折豆一㪷問折豆幾何答曰三千六百六十二碩一㪷九合三勺七抄五撮術曰列米數為實以八升一合九勺二抄為法實如法而一合問今有芝麻四萬碩每五升一合二勺對粟一㪷問對粟幾何
  hash: sha256:7a6ac9f10ee8a2b54267f88b70941e622d8c0b472a6a0bf6269c904d06be1f68
