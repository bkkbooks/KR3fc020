body:
  text: 銖斤價一百六十一文其七石三鈞三兩二十銖斤價一百六十文術曰列錢以三百八十四乘之得九千六百萬為實列桂花通銖得五十九萬八千四百九十二為法實如法而一得一百六十文為賤斤價內加一文即貴斤價不盡二十四萬一千二百八十反減下法餘三十五萬七千二百一十二以石鈞兩銖法除之得七石三鈞三兩二十銖為賤數其不盡二十四萬一千二百八十以石稱斤兩銖法除之得五石一稱一十三斤五兩八銖即貴數合問今有錢三十八貫四百文買木香一石二鈞一十四斤一十四兩八銖欲其貫賤兩率問各幾何答曰其二鈞一斤四兩兩價一十三文其一石一十三斤一十兩八銖兩價一十二文
  hash: sha256:743512a2424c99fd66097d4f761ad515d3334740e8c4abe489aac3c72ee5537a
