body:
  text: 余少也嘗留意筭學而東國所傳不過詳明等書淺近之法如九章六觚微妙之術鮮有解者無可質問歲丁酉居憂抱病無外事適得抄本楊輝筭書於今金溝縣令鄭君瀁又得國初印本算學啓蒙於地部會士慶善徵較其同異究其源流則楊輝非但字多豕亥術亦舍易趨囏不便初學啓蒙簡而且備實是筭家之摠要第其末端二紙漫獘過半殆不可辨今大興縣監任君濬於術無所不通一見而解之手圖而補其缺其後偶得一抄本讎之果不差毫氂於是乎遂爲成書而布之不廣慮益久而絕其傳㪅以楊輝望海島一章添入卷尾刊梓而壽之以遺後之游秇君子云順治十七年庚子七月下浣通政大夫守全南道觀察使兼兵馬水軍節度使廵查使全州府尹金始振識乙未校正
