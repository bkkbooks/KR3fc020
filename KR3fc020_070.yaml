body:
  text: 術曰列芝麻共數於上以三斤七分五釐乘之七分五釐者乃十二兩留數也合問今有小麥五碩九斗二升每斗磨麵六斤一十四兩問磨麵幾何答曰四百單七斤術曰列麥數於上以六斤八分七釐半乘之八分七釐半者乃十四兩留數合問今有菉豆三十二碩七斗三升每斗造粉五升六兩問造粉幾何答曰一千七百五十九斤三兩八錢術曰列豆數於上以五斤三分七釐半乘之三分七釐半者乃六兩留數也斤下分者身外加六為兩合問今有甘草九千七百六十五斤一十兩每斤博絹一尺二分四釐問博絹幾何答曰一萬尺術曰列甘草共數斤下留兩於上以一尺單二分四釐乘之合問今有白檀四千八百八十二斤一十三兩每斤價錢四貫九十六文問錢幾何
