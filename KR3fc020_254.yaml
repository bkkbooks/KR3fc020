body:
  text: 答曰雞一十五兩一十一分兩之三分兔一斤六兩一十一分兩之十術曰依乃四雞一兔重八十四兩一雞三兔亦重八十四兩圖布算以右上雞四遍因左行仍以右行直減之左上雞空餘兔十一重二百五十二兩上法下實而一得兔重通分內子得二百五十二寄位以分毋十一通右下重得九百二十四以減寄位餘六百七十二以四而一得一百六十八又以分毋十一約之得雞重不滿法者命之合問今有甲乙丙持絲不知其數甲云得乙絲強半丙絲弱半滿一百四十八斤乙云得甲絲弱半丙絲強半滿一百二十八斤丙云得甲絲強半乙絲弱半滿一百三十二斤問甲乙丙各絲幾何答曰甲八十四斤乙六十八斤
  hash: sha256:e18df3a8565dc663759c53b3d7f99c5106c2eb52f93b7aefdaf37627e3efe379
