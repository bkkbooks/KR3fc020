body:
  text: 絲九斤八兩乙絲八斤一十兩丙絲七斤六兩問各分羅幾何匹法二十六尺答曰甲二十匹一丈二尺乙一十八匹一丈五尺丙一十五匹二丈三尺術曰置羅全匹通尺內子得一千四百二十八丈各以元絲通兩內子乘之甲得二十一萬七千五十六乙得一十九萬七千六十四丙得一十六萬八千五百四各爲列實併各人絲得四百八兩爲法各實如法而一卽得各以匹法約之合問今有甲乙丙共分米三十三碩八升須令甲四乙三丙一分問各幾何答曰甲一十六碩五㪷四升乙一十二碩四㪷五合丙四碩一㪷三升五合術曰各以分率乘共米甲得一千三百二
