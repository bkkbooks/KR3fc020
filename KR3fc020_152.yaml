body:
  text: 升造酒七㪷八升今欲造酒二十五碩七㪷七十五分㪷之一十七問用黍幾何答曰二十六碩五㪷術曰列二十五碩七㪷通分內子一十七得一萬九千二百九十二以一碩五㪷乘之又以四㪷五升乘之得一百三十萬二千二百一十爲實列米八㪷四升以酒七㪷八升乘之又以分母七十五乘之得四千九百一十四爲法實如法而一合問求差分和門九問今有雞兎一百共足二百七十二隻只云雞租二兎足四問雞兎各幾何答曰雞六十四隻兎三十六箇術曰列一百以兎足乘之得數內減共足餘一百二十八爲實列雞兎足以少減多餘二爲法而一得雞反減一百卽兎合問又術曰倍一百以減共足餘半之卽兎也
  hash: sha256:01a0a16e9bbc725cc7fbca178f5abc1b8854eaace65b8a73ae7abaf89771ae37
