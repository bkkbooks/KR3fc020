body:
  text: 八貫三百問馬價及人各幾何答曰馬價五十三貫七百文人六十三術曰依以人數維乘所出率左上圖布算得四萬九千右上得七萬二千副置相減得二萬三千為約法又以盈不足維乘之左上得八億九千六百七十萬右上得三億三千八百四十萬併之得一十二億三千五百一十萬為實人數互乘各得六十三亦以盈不足維乘之左中得一百一十五萬二千九百右中得二十九萬六千一百併之得一百四十四萬九千為法各以二萬三千約之實為馬價法為人數合問今有甲米不知其數貯於四碩五㪷囤中乙誤入粟滿而相和今變為糲米共量得三碩四㪷四升問甲米乙粟各幾何糲米六升折粟一斗答曰
  hash: sha256:6323ba5157d15c3180d34697955c0bd5182ec29da9b840a07c1847734796d747
