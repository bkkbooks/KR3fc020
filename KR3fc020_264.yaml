body:
  text: 和八分之五一十四歩問句股弦各幾何答曰句二十一歩股二十八歩弦三十五歩術曰以前分毋四十九乘餘數得一千七十八乃是四十二箇股弦和內減二十八箇句弦和餘數又以後分毋二十四乘不及歩數得三百三十六乃是八箇股弦和減一十五箇句弦和餘數也如方程正負術入之依圖以右上遍乘左行仍以右行布筭異減同加左行左中餘四百六左下二萬五千五百七十八上法下實而一得六十三歩乃股弦和八之加入右下得數以十五約之得五十六歩卽句弦和立天元一爲弦以減股弦和餘爲股以減句弦和餘爲句自之爲句羃又列股自乗爲股羃併入句羃與弦羃相消得開方式平方開之得弦減股弦和卽股減勾弦和卽勾和問
  hash: sha256:4d98e38adbf2cc6c1b79d715e1e91323102478bebe45e8a8eb84a914315c8312
