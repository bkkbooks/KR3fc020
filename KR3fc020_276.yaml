body:
  text: 長別列和以減云數餘為二平以二長二平增乘起為四段積寄左列畒通步內子四之與寄左相消得開方式平方開之得和合問今有方圓田各一段共地九畒四分五釐只云方田面與圓田徑適等問方面圓徑各幾何答曰方面圓徑各三十六步術曰立天元一為方面亦為圓徑自之為方積寄左又列圓徑之三因四而一為圓積加入寄左得式再寄列畒通步與再寄相消得開方式平方開之得方面圓徑合問今有方圓田各一段共地七畒二十八步只云方面不及圓徑一十三步問圓徑方面各幾何答曰圓徑三十八步方面二十五步術曰立天元一為圓徑減不及餘為
