body:
  text: 徑不及立方面十四尺却多平方面二十八尺問三事各幾何答曰立方面九十八尺立圓徑八十四尺平方面五十六尺術曰立天元一爲立圓徑加十四尺爲立方面再自乘又以十六乘之得爲十六段立方積寄左又列立圓徑減二十八尺爲平方面也自之又十六乘之爲十六段平方積寄左又列立圓徑再自乘九之亦爲十六段立圓積三位併之共爲再寄列共積十六乘十六段積之與再寄相消得開方立方開之得立圓徑加不及式卽立方面減多卽平方面也今有立圓立方平圓平方各一立圓從古法平圓從客率積一萬八千五百八十六尺只云立圓徑多於平圓徑二尺却少於立方面八尺立方面如平
