body:
  text: 無案劉嶶所注之九章本亦作李籍音義謂當作宛字之誤也蓋去爾雅宛中宛邱注中央隆高之義今刻從李所改楊輝算法作畹考説文畹下注田三十畝也與中央隆高亦迥別夏侯陽算經丸田注形如核半彈丸術曰徑乘周四而一與此合丸音近畹形近似雖不見于字書殆如明邢雲路古今律秝考羃積之羃別作同為算書習用字且鶡冠子天權篇䠺蜚垂之䠺字字亦字書所無無可疑義又是書遆減遆因之遆字凡數見遆在集韻十二齊下注田黎切姓也訓與術文不協據術義當為遞集韻遞或作遞想因遞遆字形相似而訛抑遞遆亦算書生算假借字無有確據未骰以臆見率改致後之學者滋惑金序謂更以楊輝望海島一章添入卷尾案楊輝算法卷未所載海島題解蓋本諸劉嶶海島算經彼中未見劉書不知所本遂以為出自楊輝其前題今有望海島立二表各五丈下小字雙行注云丈當作步此亦彼中所校據楊書及劉嶶本經并云高三丈蓋彼中鈔本誤三為五因不合數轉疑不誤之丈字為誤耳又楊書及劉嶶本經并于術曰
  hash: sha256:ad7d88981928c76ece0148b43306aab52e2d4a07da691e9048e06aaecc5fd21f
