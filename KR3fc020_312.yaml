body:
  text: 今有望海島立二表各五丈丈當作歩相去千歩前後參直從前表却行一百二十三歩人目着地取望島峰與前表參齊復從後表却行一百二十七歩人目著地取望島峯亦與後表參齊問島高及島距前表幾何答曰島高四里五十五歩島距前表一百二里一百五十歩六尺爲一歩三百歩爲一里術曰以表高乘表間以相多爲法除之得島高以前表却行乘表間以相多爲法除之得島逺按表高者五歩也表間者千歩也前表却行者一百二十三歩也相多者前後表却行相減之餘四歩也每退千歩得嬴四歩故嬴满表高是得島高每進千歩遆減四歩故減盡却行是得島逺然島高必須㪅加表高方准今有竿不知其高從竿脚量距二十五尺立十尺之表表後五尺立四尺窺穴望見表端與竿參齊問竿高幾何答曰四十尺術曰以窺穴減表高得六尺以乘量距爲實以表後爲法除之又加表高得竿高按距逺五六得高六六㪅加窺下是得竿高
