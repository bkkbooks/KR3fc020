body:
  text: 升造酒七㪷八升今欲造酒二十五碩七㪷七十五分㪷之一十七問用黍幾何答曰二十六碩五㪷術曰列二十五碩七㪷通分內子一十七得一萬九千二百九十二以一碩五㪷乘之又以四㪷五升乘之得一百三十萬二千二百一十為實列米八㪷四升以酒七㪷八升乘之又以分母七十五乘之得四千九百一十四為法實如法而一合問求差分和門九問今有雞兔一百共足二百七十二隻只云雞租二兔足四問雞兔各幾何答曰雞六十四隻兔三十六箇術曰列一百以兔足乘之得數內減共足餘一百二十八為實列雞兔足以少減多餘二為法而一得雞反減一百即兔合問又術曰倍一百以減共足餘半之即兔也
