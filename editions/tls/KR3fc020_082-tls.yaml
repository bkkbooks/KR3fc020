body:
  text: 答曰五百四十七鋌今有錢四千四百一十六貫欲買大羅每匹價錢六貫文問得幾何答曰七百三十六匹今有錢六百二十四貫四百文欲買甘草每秤價錢七百文問得幾何答曰八百九十二秤今有錢五十貫七百二十文欲買細布每尺價錢八十文問得幾何答曰六百三十四尺今有錢三萬八千二百五十貫欲買良馬每匹價錢九十貫問得幾何答曰四百二十五匹術曰列錢數爲實以價錢爲法而一合問今有錢一十七貫七百四十五文欲糴黑荳斛價二百一十文問糴荳幾何答曰八十四斛半術曰列錢數爲實以斛價二百一十文爲法實如法而一合問今有錢二十四貫三十五文欲買白宻斤價三
