body:
  text: 松庭朱世傑編撰縱橫因法門八問此法從來向上因但言十者過其身呼如本位須當作知算縱橫數目真今有粟二百一十六斗每斗價錢二文問計錢幾何答曰四百三十二文今有絲一百四十四兩每兩價錢三百文問計錢幾何答曰四十三貫二百文今有羊三百五十四隻每隻價錢四貫文問計錢幾何答曰一千四百一十六貫今有銀五百四十七鋌每鋌重五十兩問為兩幾何答曰二萬七千三百五十兩今有絹七百三十六匹每匹價錢六貫文問計錢幾何答曰四千四百一十六貫
  hash: sha256:97053eb90a31333e0ae3446cf79f344dfd37f0e9fbe4ad93ecbf49d44cd7ac65
