body:
  text: 術曰上周自乘下周亦自乘又上下周相乘三位併之得九千七十二尺以高乘之得一十八萬一千四百四十以三十六而一得五千四十尺以斛法約之合問今有粟一百四碩六㪷九升欲作圓囤貯之滿中而粟適盡令高八尺七寸問周幾何答曰一丈九尺術曰列米以斛法二尺五寸乘之又以十二乘之得三千一百四十尺七寸以高八尺七寸除之得三百六十一爲實以一爲廉法平方開之得周合問雙擄互換門六問今有織匠二十四人一百九十二日織錦一千一百五十二匹欲令六十二人織三百六十日問織錦幾何答曰五千五百八十匹術曰列三百六十日以六十二人乘之又以織錦匹數乘之得二千五百七十一萬二千六百四十爲實列一百九十二日以
  hash: sha256:95eaf2c1af55b2e59412a034a2457b3bde308a5cb31560d26d125e75f034b56d
