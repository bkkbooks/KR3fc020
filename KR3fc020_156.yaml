body:
  text: 二貫七百七十二文五分以減直錢餘六貫六百三十文五分為實列粟米㪷價相減餘八十九文為法實如法而一得米反減共數餘即粟也合問今有金瓶一十二隻銀瓶一十五隻稱之重適等交換一隻而稱之金輕五兩七錢半問二色各一重幾何答曰金瓶一隻重二十八兩七錢半銀瓶一隻重二十三兩術曰副置五兩七錢半上位十五乘之下位十二乘之各自為實列金銀瓶以少減多餘三隻為法各實如法而一上為金瓶重下為銀瓶重合問今有羅七尺綾九尺其價適等只云綾尺價不及羅尺價三十六文問二色尺價各幾何答曰羅尺價一百六十二丈綾尺價一百二十六文
