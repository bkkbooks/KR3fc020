body:
  text: 不盡一萬九千六十四乃賤價也反減下法餘九千六百一十六卽貴價四之得三萬八千四百六十四以鈞斤兩銖法約之得三鈞一十斤二兩一十六銖其不盡一萬九千六十四五之得九萬五千三百二十以石斤兩銖法除之得二石八斤三兩一十六銖合問新編筭學啓蒙卷中
