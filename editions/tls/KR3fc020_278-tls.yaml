body:
  text: 方面自之就分四之爲四段方積寄左又列圓徑自之三因亦爲四段圓積加入寄左得再寄列畒通歩內子四之與再寄相消得開方式平方飜法開之得圓徑減不及卽方面合問今有直田九畒八分只云長取八分之五平取三分之二相併得六十三歩問長平各幾何答曰平四十二歩長五十六歩術曰依母互乘子乃得長十五箇平十六箇分母圖布筭相乘得二十四以乗六十三得一千五百一十二卽是一十五長一十六平數也立天元一爲平以十六乘之減云數餘爲一十五長用平乘之爲一十五段積寄左列畒通歩以一十五乘之與寄左相消得開方式平方開之得平以平除積得長合問
