body:
  text: 甲二千一百九十引乙一千二百九十引丙一千一百七十引術曰各列元引以止查鹽數乘之甲得一千六百九十七萬二千五百乙得九百九十九萬七千五百丙得九百六萬七千五百各爲列實併各人元引得七千七百五十爲法各實如法而一合問今有銀一秤一斤十兩令甲乙丙從上作折半差分之問各得幾何答曰甲一百五十二兩乙七十六兩丙三十八兩術曰置銀通兩內子得二百六十六兩爲實併各人分數得七爲法實如法而一得丙銀倍之爲乙銀又倍卽甲銀合問今有甲乙丙丁分絲五百四十四斤從上作四六差分之問各得幾何答曰
  hash: sha256:492bbcadb4dd019a43e03eaa8c5216efd32be9e14b1cd66f74f9730d9e5b05bc
