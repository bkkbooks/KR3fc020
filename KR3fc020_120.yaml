body:
  text: 每兩直絲幾何答曰八分半直六斤一十兩二錢五分七斤半直五斤一十三兩七錢五分術曰置絲通兩為實列五兩以八分半乘之又列五兩以七分半乘之得數併之得八兩乃是十分金數為實如法而一得一百二十五兩乃一兩金之絲數也副置上以八分半乘之下以七分半乘之又各以斤率約之合問今有粟一十九碩六斗八合欲為糙細二米糙米八升用粟一斗細米五升一合二勺用粟一斗須令糙米倍之細米之數問各幾何答曰細米四碩四斗三合二勺糙米八碩八斗六合四勺術曰列粟數以五升一合二勺乘之得一百斗三升九合二勺九抄六撮為實以二斗二升八合為法實如法而一為法之數各以五升一合二勺為率細米一停折粟一斗糙米二停折粟一斗二升八合二位併之共得
  hash: sha256:aba2c62906a4aa94b7bd8ad431737bd1d4b0ebc6bd1546f306b944dd768b737d
