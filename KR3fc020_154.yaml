body:
  text: 今有錢二十九貫六百八十七文五分共買密蠟一百四十六斤六兩只云蠟斤價三百八十文密斤價六十八文問各幾何答曰密八十三斤二兩蠟六十三斤四兩術曰列密蠟共數斤下留兩以蠟斤價乘之得五十五貫六百二十二文五分內減今有錢餘二十五貫九百三十五文為實列密蠟斤價相減餘三百一十二文為法實如法而一得密斤下分者身外價六為兩反減共數餘即蠟也合問今有粟米一十七碩三升直錢一十九貫四百三文之云粟㪷價七十五文米㪷價一百六十四文問各幾何答曰米七碩四㪷五升粟九碩五㪷八升術曰列粟米共數以粟㪷價乘之得一十
