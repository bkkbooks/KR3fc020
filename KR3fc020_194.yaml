body:
  text: 術曰列程功五百九十八尺五之七而一得定功四百二十七尺七分尺之一也併上下廣而半之得二丈二尺五寸以湥一丈五尺乘之得三百三十七尺五寸寄位列袤三十六里以古法三百歩通之內子得一萬一千八十五歩六之通尺得六萬六千五百一十尺以乘寄位得二千二百四十四萬七千一百二十五尺爲河積也以分母七之得一億五千七百一十二萬九千八百七十五爲實又列定功四百二十七尺通分內子得二千九百九十爲法實如法而一不满法者各以五約之合問今要築堤上廣六尺四寸下廣一丈五尺六寸高六尺袤三里七十四歩冬程人功三百六十四尺問共用徒幾何答曰一千五十九人九十一分人之五十七術曰併兩廣而半之得一丈一尺爲停濶也以高六尺乘之得六十六尺於上位又列袤三里以古法三百歩通之內子得九百七
