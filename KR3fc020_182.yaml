body:
  text: 共併八位得一萬八千一百一十以差一碩六㪷乘之得二十八萬九千七百六十爲拋差併共戶得六千四百以率戶糧一十碩二㪷六升乘之若是均科每戶得一十碩二㪷六升也得六十五萬六千六百四十內減拋差餘三十六萬六千八百八十爲實以共戶六千四百爲法實如法而一得壬等每戶之數各加差一碩六㪷得逐等每戶之糧數求各等共粮者以各戶粮數乘其各等之戶合問今有某縣配粟一萬八百七十碩八升於上中下三鄉從上作折半差配之謂如上鄉六碩中鄉三碩下鄉一碩五科又上鄉三等作九一折中鄉三等作二八折下鄉三等作三七折上鄉上等五十六戶中等七十四戶下等九十八戶中鄉上等八十二戶中等一百二十戶下等一百六十戶下鄉上等九十五戶中等一百七十二戶下等一百八十
