body:
  text: 今有甲米六分㪷之五乙米五分㪷之四丙米四分㪷之三問減多益小各幾何而平答曰各平一百八十分之一百四十三術曰依毋互乘子右上得一百右圖布算中得九十六右下得九十各為列實副併得二百八十六為平實左行分毋相乘得一百二十為法又三之得三百六十亦三因右行未併者平實法實各半之得數減右上七減右中一而益右下得各平也合問今有六人五分人之四分銀八兩七分兩之三六分兩之五問人得幾何答曰一兩一千四百二十八分兩之五百一十七術曰依毋互乘子併之得五十三寄圖布算位左行相乘得四十二以乘銀八兩得三百三十六併入寄位共得三百八十九以人分毋五因之得一千九百四十五為實又列六人通分內子得三十四以銀分毋四十二乘之得一千四百二
  hash: sha256:5b707b657ab51fdaac22ea392055c127c0e82099f62c7c86b7d1da0087b59072
